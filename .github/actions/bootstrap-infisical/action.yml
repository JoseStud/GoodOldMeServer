name: Bootstrap Infisical
description: Install Infisical CLI and optionally perform OIDC login. For convenience this can also install jq/yq.

inputs:
  tool_versions_lock_path:
    description: Path to lock file with tool versions and checksums.
    required: false
    default: .github/ci/tool-versions.lock

  install_infisical:
    description: Install infisical-core CLI.
    required: false
    default: "false"
  infisical_login:
    description: Run infisical OIDC login after installation.
    required: false
    default: "false"
  infisical_machine_identity_id:
    description: Machine identity id for OIDC login.
    required: false
    default: ""
  infisical_domain:
    description: Infisical domain.
    required: false
    default: https://app.infisical.com

  # optional helpers
  install_jq:
    description: Also install jq.
    required: false
    default: "false"
  install_yq:
    description: Also install yq.
    required: false
    default: "false"

  infisical_version:
    description: infisical-core package version override.
    required: false
    default: ""
  infisical_sha256:
    description: infisical-core package SHA256 override.
    required: false
    default: ""

outputs:
  infisical_version_installed:
    description: Installed infisical version.
    value: ${{ steps.infisical_version.outputs.infisical_version_installed }}
  jq_version_installed:
    description: Installed jq version.
    value: ${{ steps.bootstrap.outputs.jq_version_installed }}
  yq_version_installed:
    description: Installed yq version.
    value: ${{ steps.bootstrap.outputs.yq_version_installed }}

runs:
  using: composite
  steps:
    - name: Bootstrap Infisical
      id: bootstrap
      shell: bash
      env:
        INPUT_TOOL_VERSIONS_LOCK_PATH: ${{ inputs.tool_versions_lock_path }}
        INPUT_INSTALL_INFISICAL: ${{ inputs.install_infisical }}
        INPUT_INFISICAL_LOGIN: ${{ inputs.infisical_login }}
        INPUT_INFISICAL_MACHINE_ID: ${{ inputs.infisical_machine_identity_id }}
        INPUT_INFISICAL_DOMAIN: ${{ inputs.infisical_domain }}
        INPUT_INSTALL_JQ: ${{ inputs.install_jq }}
        INPUT_INSTALL_YQ: ${{ inputs.install_yq }}
        INPUT_INFISICAL_VERSION: ${{ inputs.infisical_version }}
        INPUT_INFISICAL_SHA256: ${{ inputs.infisical_sha256 }}
      run: "${{ github.action_path }}/../bootstrap-tools/bootstrap-tools.sh"


    - name: Set Infisical Version Output
      id: infisical_version
      if: inputs.install_infisical == 'true' || inputs.infisical_login == 'true'
      shell: bash
      run: |
        if command -v infisical >/dev/null 2>&1; then
          VERSION="$(infisical --version)"
          echo "infisical_version_installed=${VERSION}" >> "${GITHUB_OUTPUT}"
        else
          echo "infisical_version_installed=" >> "${GITHUB_OUTPUT}"
        fi

    - name: Run Infisical Login
      if: inputs.infisical_login == 'true'
      shell: bash
      run: infisical login --method=oidc --oidc-client-id="${{ inputs.infisical_machine_identity_id }}" --domain="${{ inputs.infisical_domain }}"
