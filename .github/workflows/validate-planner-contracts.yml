name: Validate Planner Contracts

on:
  pull_request:
    paths:
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "scripts/**"
      - "stacks"
      - ".gitmodules"
  push:
    paths:
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "scripts/**"
      - "stacks"
      - ".gitmodules"

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: read

concurrency:
  group: validate-planner-contracts-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  bootstrap-query-tools-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load tool lock
        id: lock
        run: |
          set -euo pipefail
          source .github/ci/tool-versions.lock
          {
            echo "jq_version=${JQ_VERSION}"
            echo "yq_version=${YQ_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Bootstrap query tools
        id: bootstrap
        uses: ./.github/actions/bootstrap-query-tools
        with:
          install_jq: "true"
          install_yq: "true"

      - name: Assert pinned versions
        run: |
          set -euo pipefail
          [[ "${{ steps.bootstrap.outputs.jq_version_installed }}" == "${{ steps.lock.outputs.jq_version }}" ]]
          [[ "${{ steps.bootstrap.outputs.yq_version_installed }}" == "${{ steps.lock.outputs.yq_version }}" ]]

  # CONTRACT: Intentionally does NOT wait for CI signals (WAIT_FOR_SUCCESS
  # defaults to false).  The orchestrator preflight sets WAIT_FOR_SUCCESS=true
  # and polls up to 900s.  DO NOT add WAIT_FOR_SUCCESS here — it defeats
  # the PR discipline gate.  See test_workflow_contracts.sh for the contract
  # assertion.
  stacks-sha-trust:
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    environment: Jux

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap jq runner
        uses: ./.github/actions/bootstrap-query-tools
        with:
          install_jq: "true"


      - name: Resolve current stacks gitlink SHA
        id: stacks-gitlink
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD:stacks)" >> "${GITHUB_OUTPUT}"

      - name: Verify trusted stacks SHA
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STACKS_REPO_READ_TOKEN: ${{ secrets.STACKS_REPO_READ_TOKEN }}
        run: .github/scripts/stacks/verify_trusted_stacks_sha.sh "${{ steps.stacks-gitlink.outputs.sha }}"
