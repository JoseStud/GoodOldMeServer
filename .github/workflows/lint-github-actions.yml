name: Lint GitHub Actions

on:
  push:
    branches:
      - main
    paths:
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".gitmodules"
      - "stacks"
      - "docs/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".gitmodules"
      - "stacks"
      - "docs/**"
      - "README.md"

permissions:
  contents: read

concurrency:
  group: lint-github-actions-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Load tool lock
        id: lock
        run: |
          set -euo pipefail
          source .github/ci/tool-versions.lock
          {
            echo "actionlint_version=${ACTIONLINT_VERSION}"
            echo "yamllint_version=${YAMLLINT_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install actionlint
        run: |
          set -euo pipefail
          go install "github.com/rhysd/actionlint/cmd/actionlint@${{ steps.lock.outputs.actionlint_version }}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "yamllint==${{ steps.lock.outputs.yamllint_version }}"

      - name: Bootstrap yq
        uses: ./.github/actions/bootstrap-query-tools
        with:
          install_yq: "true"

      - name: Run actionlint
        run: actionlint -color

      - name: Run yamllint
        run: |
          yamllint \
            -d "{extends: default, rules: {truthy: disable, line-length: disable, document-start: disable}}" \
            .github/ci .github/workflows .github/dependabot.yml

      - name: Run yq parse checks
        run: |
          set -euo pipefail
          find .github -type f \( -name '*.yml' -o -name '*.yaml' \) -print0 \
            | while IFS= read -r -d '' file; do
                yq eval '.' "$file" >/dev/null
              done
