name: Reusable Orchestrator Preflight

on:
  workflow_call:
    inputs:
      has_work:
        required: true
        type: boolean
      stacks_sha:
        required: false
        type: string
        default: ''
      run_infra_apply:
        required: true
        type: boolean
      run_ansible_bootstrap:
        required: true
        type: boolean
      run_portainer_apply:
        required: true
        type: boolean
      run_host_sync:
        required: true
        type: boolean
      run_health_redeploy:
        required: true
        type: boolean
    outputs:
      runner_label:
        value: ${{ jobs.cloud-runner-guard.outputs.runner_label }}
      network_access_policy_json:
        value: ${{ jobs.network-policy-sync.outputs.network_access_policy_json }}

permissions:
  id-token: write
  contents: read

env:
  INFISICAL_MACHINE_IDENTITY_ID: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}
  INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
  SHADOW_MODE: ${{ vars.SHADOW_MODE || 'false' }}
  TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
  TFC_WORKSPACE_INFRA: ${{ vars.TFC_WORKSPACE_INFRA || 'goodoldme-infra' }}

jobs:
  cloud-runner-guard:
    if: ${{ inputs.has_work }}
    runs-on: ubuntu-latest
    # timeout: single env-var echo; 5 min is a hard ceiling for this trivial step
    timeout-minutes: 5
    outputs:
      runner_label: ${{ steps.guard.outputs.runner_label }}

    steps:
      - name: Verify cloud runner guard
        id: guard
        env:
          CLOUD_STATIC_RUNNER_LABEL: ${{ vars.CLOUD_STATIC_RUNNER_LABEL }}
        run: |
          : "${CLOUD_STATIC_RUNNER_LABEL:?Missing required variable: CLOUD_STATIC_RUNNER_LABEL}"
          echo "runner_label=${CLOUD_STATIC_RUNNER_LABEL}" >> "${GITHUB_OUTPUT}"

  stacks-sha-trust:
    if: ${{ inputs.stacks_sha != '' }}
    runs-on: ubuntu-latest
    # timeout: polls GitHub Checks API until all stacks CI signals are green (default 900 s) plus headroom
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap jq runner
        uses: ./.github/actions/bootstrap-query-tools
        with:
          install_jq: "true"

      - name: Verify trusted stacks SHA
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STACKS_REPO_READ_TOKEN: ${{ secrets.STACKS_REPO_READ_TOKEN }}
          WAIT_FOR_SUCCESS: "true"
          WAIT_TIMEOUT_SECONDS: ${{ vars.STACKS_SHA_TRUST_WAIT_TIMEOUT_SECONDS || '900' }}
          POLL_INTERVAL_SECONDS: ${{ vars.STACKS_SHA_TRUST_POLL_INTERVAL_SECONDS || '15' }}
        run: .github/scripts/stacks/verify_trusted_stacks_sha.sh "${{ inputs.stacks_sha }}"

  secret-validation:
    needs: [cloud-runner-guard]
    if: ${{ inputs.has_work && needs.cloud-runner-guard.result == 'success' }}
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}
    # timeout: Infisical API checks for up to 5 secret paths; 15 min covers transient latency
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secret paths
        env:
          RUN_INFRA: ${{ inputs.run_infra_apply }}
          RUN_ANSIBLE: ${{ inputs.run_ansible_bootstrap }}
          RUN_PORTAINER: ${{ inputs.run_portainer_apply }}
          RUN_HOST_SYNC: ${{ inputs.run_host_sync }}
          RUN_HEALTH: ${{ inputs.run_health_redeploy }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_AGENT_CLIENT_ID: ${{ secrets.INFISICAL_AGENT_CLIENT_ID }}
          INFISICAL_AGENT_CLIENT_SECRET: ${{ secrets.INFISICAL_AGENT_CLIENT_SECRET }}
        run: .github/scripts/stages/secret_validation.sh

  # !cancelled(): stacks-sha-trust may be skipped when no stacks_sha is
  # in the plan.  Without !cancelled(), this job would be skipped too.
  network-policy-sync:
    needs: [cloud-runner-guard, stacks-sha-trust, secret-validation]
    if: ${{ !cancelled() && inputs.has_work && needs.cloud-runner-guard.result == 'success' && needs.secret-validation.result == 'success' && (needs.stacks-sha-trust.result == 'success' || needs.stacks-sha-trust.result == 'skipped') }}
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}
    # timeout: writes runner IP to TFC variable sets and Infisical allowlists; 15 min covers API retries
    timeout-minutes: 15
    outputs:
      network_access_policy_json: ${{ steps.sync.outputs.network_access_policy_json }}
      portainer_automation_allowed_cidrs: ${{ steps.sync.outputs.portainer_automation_allowed_cidrs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Idempotent mutation: writes to TFC variable sets and Infisical
      # allowlists.  If later stages fail, these values persist — this is
      # safe because the policy is derived from the runner's current IP
      # and static network architecture.  Next run re-syncs identical values.
      - name: Build and sync network policy
        id: sync
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
        run: .github/scripts/stages/network_policy_sync.sh
