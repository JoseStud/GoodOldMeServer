name: IaC Validation

on:
  pull_request:
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".ansible-lint"
  push:
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".ansible-lint"
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  statuses: read

concurrency:
  group: iac-validation-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  detect-impact:
    runs-on: ubuntu-latest
    outputs:
      infra_workspace_changed: ${{ steps.detect.outputs.infra_workspace_changed }}
      portainer_workspace_changed: ${{ steps.detect.outputs.portainer_workspace_changed }}
      ansible_changed: ${{ steps.detect.outputs.ansible_changed }}
      stacks_gitlink_changed: ${{ steps.detect.outputs.stacks_gitlink_changed }}
      stacks_sha: ${{ steps.detect.outputs.stacks_sha }}
      changed_tf_roots_json: ${{ steps.detect.outputs.changed_tf_roots_json }}
      tfc_workspace_matrix_json: ${{ steps.detect.outputs.tfc_workspace_matrix_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect impact
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA_CURRENT: ${{ github.sha }}
        run: |
          set -euo pipefail

          EMPTY_TREE_SHA="4b825dc642cb6eb9a060e54bf8d69288fbee4904"

          infra_workspace_changed="false"
          portainer_workspace_changed="false"
          ansible_changed="false"
          stacks_gitlink_changed="false"
          stacks_sha=""

          changed_files=""
          raw_stacks_diff=""

          declare -a changed_tf_roots=()
          declare -a tfc_matrix_rows=()

          append_tf_root_if_changed() {
            local root="$1"
            local pattern="$2"
            if grep -Eq "$pattern" <<<"${changed_files}"; then
              changed_tf_roots+=("${root}")
            fi
          }

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            infra_workspace_changed="true"
            portainer_workspace_changed="true"
            ansible_changed="true"
            stacks_sha="$(git rev-parse HEAD:stacks 2>/dev/null || true)"

            changed_tf_roots=(
              "terraform/infra"
              "terraform/oci"
              "terraform/gcp"
              "terraform/portainer-root"
              "terraform/portainer"
            )

            tfc_matrix_rows=(
              '{"workspace_key":"infra","config_directory":"terraform/infra"}'
              '{"workspace_key":"portainer","config_directory":"terraform/portainer-root"}'
            )
          else
            base_sha=""
            head_sha="${GITHUB_SHA_CURRENT}"

            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              base_sha="${PR_BASE_SHA}"
              head_sha="${PR_HEAD_SHA}"

              if ! git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
                head_sha="${GITHUB_SHA_CURRENT}"
              fi

              if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
                echo "Unable to resolve PR base SHA '${base_sha}' locally."
                exit 1
              fi

              changed_files="$(git diff --name-only "${base_sha}" "${head_sha}" || true)"
              raw_stacks_diff="$(git diff --raw --abbrev=40 "${base_sha}" "${head_sha}" -- stacks || true)"
            elif [[ "${EVENT_NAME}" == "push" ]]; then
              base_sha="${PUSH_BEFORE_SHA}"

              if [[ "${base_sha}" =~ ^0+$ ]]; then
                changed_files="$(git show --name-only --pretty='' "${head_sha}" || true)"
                raw_stacks_diff="$(git diff --raw --abbrev=40 "${EMPTY_TREE_SHA}" "${head_sha}" -- stacks || true)"
              else
                changed_files="$(git diff --name-only "${base_sha}" "${head_sha}" || true)"
                raw_stacks_diff="$(git diff --raw --abbrev=40 "${base_sha}" "${head_sha}" -- stacks || true)"
              fi
            fi

            if grep -Eq '^terraform/(infra|oci|gcp)/' <<<"${changed_files}"; then
              infra_workspace_changed="true"
            fi

            if grep -Eq '^terraform/(portainer-root|portainer)/' <<<"${changed_files}"; then
              portainer_workspace_changed="true"
            fi

            if grep -Eq '(^ansible/|^\.ansible-lint$)' <<<"${changed_files}"; then
              ansible_changed="true"
            fi

            append_tf_root_if_changed "terraform/infra" '^terraform/infra/'
            append_tf_root_if_changed "terraform/oci" '^terraform/oci/'
            append_tf_root_if_changed "terraform/gcp" '^terraform/gcp/'
            append_tf_root_if_changed "terraform/portainer-root" '^terraform/portainer-root/'
            append_tf_root_if_changed "terraform/portainer" '^terraform/portainer/'

            stack_raw_line="$(printf '%s\n' "${raw_stacks_diff}" | awk '$0 ~ /(^:|^::)/ && ($0 ~ /\tstacks$/ || $0 ~ / stacks$/) {print; exit}')"
            if [[ -n "${stack_raw_line}" ]]; then
              stacks_gitlink_changed="true"
              parsed_new_sha="$(awk '{print $4}' <<<"${stack_raw_line}")"
              if [[ "${parsed_new_sha}" =~ ^[0-9a-f]{40}$ ]]; then
                stacks_sha="${parsed_new_sha}"
              fi
            fi

            if [[ "${infra_workspace_changed}" == "true" ]]; then
              tfc_matrix_rows+=(
                '{"workspace_key":"infra","config_directory":"terraform/infra"}'
              )
            fi

            if [[ "${portainer_workspace_changed}" == "true" ]]; then
              tfc_matrix_rows+=(
                '{"workspace_key":"portainer","config_directory":"terraform/portainer-root"}'
              )
            fi
          fi

          if (( ${#changed_tf_roots[@]} == 0 )); then
            changed_tf_roots_json='[]'
          else
            changed_tf_roots_json="$(printf '%s\n' "${changed_tf_roots[@]}" | jq -R . | jq -s -c .)"
          fi

          if (( ${#tfc_matrix_rows[@]} == 0 )); then
            tfc_workspace_matrix_json='[]'
          else
            tfc_workspace_matrix_json="$(printf '%s\n' "${tfc_matrix_rows[@]}" | jq -s -c .)"
          fi

          echo "infra_workspace_changed=${infra_workspace_changed}" >> "${GITHUB_OUTPUT}"
          echo "portainer_workspace_changed=${portainer_workspace_changed}" >> "${GITHUB_OUTPUT}"
          echo "ansible_changed=${ansible_changed}" >> "${GITHUB_OUTPUT}"
          echo "stacks_gitlink_changed=${stacks_gitlink_changed}" >> "${GITHUB_OUTPUT}"
          echo "stacks_sha=${stacks_sha}" >> "${GITHUB_OUTPUT}"
          echo "changed_tf_roots_json=${changed_tf_roots_json}" >> "${GITHUB_OUTPUT}"
          echo "tfc_workspace_matrix_json=${tfc_workspace_matrix_json}" >> "${GITHUB_OUTPUT}"

      - name: Print impact outputs
        run: |
          echo "infra_workspace_changed=${{ steps.detect.outputs.infra_workspace_changed }}"
          echo "portainer_workspace_changed=${{ steps.detect.outputs.portainer_workspace_changed }}"
          echo "ansible_changed=${{ steps.detect.outputs.ansible_changed }}"
          echo "stacks_gitlink_changed=${{ steps.detect.outputs.stacks_gitlink_changed }}"
          echo "stacks_sha=${{ steps.detect.outputs.stacks_sha }}"
          echo "changed_tf_roots_json=${{ steps.detect.outputs.changed_tf_roots_json }}"
          echo "tfc_workspace_matrix_json=${{ steps.detect.outputs.tfc_workspace_matrix_json }}"

  terraform-fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

  terraform-validate:
    needs: detect-impact
    if: ${{ needs.detect-impact.outputs.changed_tf_roots_json != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        root: ${{ fromJson(needs.detect-impact.outputs.changed_tf_roots_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (readonly lockfile)
        run: terraform -chdir=${{ matrix.root }} init -backend=false -lockfile=readonly -input=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.root }} validate

  tfc-speculative-plan:
    needs: [detect-impact, terraform-validate]
    if: ${{ needs.detect-impact.outputs.tfc_workspace_matrix_json != '[]' && (needs.terraform-validate.result == 'success' || needs.terraform-validate.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.detect-impact.outputs.tfc_workspace_matrix_json) }}
    env:
      TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
      TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
      TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve workspace and validate required inputs
        id: preflight
        env:
          TFC_WORKSPACE_INFRA: ${{ vars.TFC_WORKSPACE_INFRA }}
          TFC_WORKSPACE_PORTAINER: ${{ vars.TFC_WORKSPACE_PORTAINER }}
        run: |
          set -euo pipefail

          if [[ -z "${TFC_TOKEN:-}" ]]; then
            echo "Missing required secret: TFC_TOKEN"
            exit 1
          fi

          if [[ -z "${TFC_ORGANIZATION:-}" ]]; then
            echo "Missing required variable: TFC_ORGANIZATION (or fallback TFC_ORG)."
            exit 1
          fi

          workspace_name=""
          case "${{ matrix.workspace.workspace_key }}" in
            infra)
              workspace_name="${TFC_WORKSPACE_INFRA:-}"
              ;;
            portainer)
              workspace_name="${TFC_WORKSPACE_PORTAINER:-}"
              ;;
            *)
              echo "Unknown workspace key: ${{ matrix.workspace.workspace_key }}"
              exit 1
              ;;
          esac

          if [[ -z "${workspace_name}" ]]; then
            echo "Missing required workspace variable for '${{ matrix.workspace.workspace_key }}'."
            exit 1
          fi

          echo "workspace_name=${workspace_name}" >> "${GITHUB_OUTPUT}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Upload configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.0.0
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          directory: ${{ matrix.workspace.config_directory }}
          speculative: true

      - name: Create speculative run
        id: create-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          plan_only: true

      - name: Wait for Terraform Cloud run to complete
        env:
          RUN_ID: ${{ steps.create-run.outputs.run_id }}
          WORKSPACE_NAME: ${{ steps.preflight.outputs.workspace_name }}
          WAIT_TIMEOUT_SECONDS: ${{ vars.TFC_PLAN_WAIT_TIMEOUT_SECONDS || '1800' }}
          POLL_INTERVAL_SECONDS: ${{ vars.TFC_PLAN_POLL_INTERVAL_SECONDS || '10' }}
        run: .github/scripts/wait_for_tfc_run.sh "${RUN_ID}" "${WORKSPACE_NAME}"

  ansible-validate:
    needs: detect-impact
    if: ${{ needs.detect-impact.outputs.ansible_changed == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ansible-core and ansible-lint
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml --force-with-deps

      - name: Run ansible-lint
        run: ansible-lint -c .ansible-lint ansible

  stacks-sha-trust:
    needs: detect-impact
    if: ${{ needs.detect-impact.outputs.stacks_gitlink_changed == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify trusted stacks SHA
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STACKS_REPO_READ_TOKEN: ${{ secrets.STACKS_REPO_READ_TOKEN }}
        run: .github/scripts/verify_trusted_stacks_sha.sh "${{ needs.detect-impact.outputs.stacks_sha }}"
