name: IaC Validation

on:
  pull_request:
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/ci/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".ansible-lint"
  push:
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/ci/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".ansible-lint"
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: read

concurrency:
  group: iac-validation-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  detect-impact:
    runs-on: ubuntu-latest
    outputs:
      plan_json: ${{ steps.detect.outputs.plan_json }}
      infra_workspace_changed: ${{ steps.detect.outputs.infra_workspace_changed }}
      portainer_workspace_changed: ${{ steps.detect.outputs.portainer_workspace_changed }}
      ansible_changed: ${{ steps.detect.outputs.ansible_changed }}
      stacks_gitlink_changed: ${{ steps.detect.outputs.stacks_gitlink_changed }}
      stacks_sha: ${{ steps.detect.outputs.stacks_sha }}
      changed_tf_roots_json: ${{ steps.detect.outputs.changed_tf_roots_json }}
      tfc_workspace_matrix_json: ${{ steps.detect.outputs.tfc_workspace_matrix_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install impact detection dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Load path filters config
        id: filter-config
        run: |
          {
            echo "filters<<EOF"
            cat .github/ci/path-filters.yml
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Detect changed paths
        id: path-filter
        if: ${{ github.event_name != 'workflow_dispatch' && !(github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000') }}
        uses: dorny/paths-filter@v3
        with:
          filters: ${{ steps.filter-config.outputs.filters }}
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Detect impact
        id: detect
        env:
          CI_PLAN_MODE: iac
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA_CURRENT: ${{ github.sha }}
          IAC_WORKSPACE_INFRA: ${{ steps.path-filter.outputs.iac_workspace_infra }}
          IAC_WORKSPACE_PORTAINER: ${{ steps.path-filter.outputs.iac_workspace_portainer }}
          IAC_ANSIBLE: ${{ steps.path-filter.outputs.iac_ansible }}
          IAC_STACKS_GITLINK_CHANGED: ${{ steps.path-filter.outputs.iac_stacks_gitlink }}
          IAC_TF_INFRA: ${{ steps.path-filter.outputs.iac_tf_infra }}
          IAC_TF_OCI: ${{ steps.path-filter.outputs.iac_tf_oci }}
          IAC_TF_GCP: ${{ steps.path-filter.outputs.iac_tf_gcp }}
          IAC_TF_PORTAINER_ROOT: ${{ steps.path-filter.outputs.iac_tf_portainer_root }}
          IAC_TF_PORTAINER: ${{ steps.path-filter.outputs.iac_tf_portainer }}
        run: .github/scripts/plan/resolve_ci_plan.sh

  terraform-fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

  terraform-validate:
    needs: detect-impact
    if: ${{ needs.detect-impact.outputs.changed_tf_roots_json != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        root: ${{ fromJson(needs.detect-impact.outputs.changed_tf_roots_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (readonly lockfile)
        run: terraform -chdir=${{ matrix.root }} init -backend=false -lockfile=readonly -input=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.root }} validate

  tfc-speculative-plan:
    needs: [detect-impact, terraform-validate]
    if: ${{ needs.detect-impact.outputs.tfc_workspace_matrix_json != '[]' && (needs.terraform-validate.result == 'success' || needs.terraform-validate.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.detect-impact.outputs.tfc_workspace_matrix_json) }}
    env:
      TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
      TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
      TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve workspace and validate required inputs
        id: preflight
        env:
          WORKSPACE_KEY: ${{ matrix.workspace.workspace_key }}
          TFC_WORKSPACE_INFRA: ${{ vars.TFC_WORKSPACE_INFRA }}
          TFC_WORKSPACE_PORTAINER: ${{ vars.TFC_WORKSPACE_PORTAINER }}
        run: .github/scripts/stages/tfc_speculative_preflight.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Upload configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.0.0
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          directory: ${{ matrix.workspace.config_directory }}
          speculative: true

      - name: Create speculative run
        id: create-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          plan_only: true

      - name: Wait for Terraform Cloud run to complete
        env:
          RUN_ID: ${{ steps.create-run.outputs.run_id }}
          WORKSPACE_NAME: ${{ steps.preflight.outputs.workspace_name }}
          WAIT_TIMEOUT_SECONDS: ${{ vars.TFC_PLAN_WAIT_TIMEOUT_SECONDS || '7200' }}
          POLL_INTERVAL_SECONDS: ${{ vars.TFC_PLAN_POLL_INTERVAL_SECONDS || '10' }}
        run: .github/scripts/tfc/wait_for_tfc_run.sh "${RUN_ID}" "${WORKSPACE_NAME}"

  ansible-validate:
    needs: detect-impact
    if: ${{ needs.detect-impact.outputs.ansible_changed == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y pipx
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          pipx install ansible-core
          pipx install ansible-lint
          ansible-galaxy collection install -r ansible/requirements.yml --force-with-deps

      - name: Run ansible-lint
        run: ansible-lint -c .ansible-lint ansible

  stacks-sha-trust:
    needs: detect-impact
    if: ${{ needs.detect-impact.outputs.stacks_gitlink_changed == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify trusted stacks SHA
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STACKS_REPO_READ_TOKEN: ${{ secrets.STACKS_REPO_READ_TOKEN }}
        run: .github/scripts/stacks/verify_trusted_stacks_sha.sh "${{ needs.detect-impact.outputs.stacks_sha }}"
