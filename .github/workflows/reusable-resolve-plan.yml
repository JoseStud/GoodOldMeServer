name: Reusable Resolve Plan

on:
  workflow_call:
    inputs:
      source_event_name:
        required: true
        type: string

      push_before:
        required: false
        type: string
      push_sha:
        required: false
        type: string

      dispatch_payload_json:
        required: false
        type: string
      dispatch_stacks_sha:
        required: false
        type: string
      dispatch_reason:
        required: false
        type: string
      dispatch_source_repo:
        required: false
        type: string
      dispatch_source_run_id:
        required: false
        type: string
      dispatch_source_sha:
        required: false
        type: string

    outputs:
      plan_json:
        value: ${{ jobs.resolve.outputs.plan_json }}

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      plan_json: ${{ steps.resolve.outputs.plan_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install plan resolver
        run: pip install --quiet .github/scripts/plan/

      - name: Resolve execution context
        id: resolve
        env:
          CI_PLAN_MODE: meta
          EVENT_NAME: ${{ inputs.source_event_name }}

          PUSH_BEFORE: ${{ inputs.push_before }}
          PUSH_SHA: ${{ inputs.push_sha }}

          PAYLOAD_JSON: ${{ inputs.dispatch_payload_json }}
          PAYLOAD_STACKS_SHA: ${{ inputs.dispatch_stacks_sha }}
          PAYLOAD_REASON: ${{ inputs.dispatch_reason }}
          PAYLOAD_SOURCE_REPO: ${{ inputs.dispatch_source_repo }}
          PAYLOAD_SOURCE_RUN_ID: ${{ inputs.dispatch_source_run_id }}
          PAYLOAD_SOURCE_SHA: ${{ inputs.dispatch_source_sha }}

          VALIDATE_DISPATCH_CONTRACT: "true"
        run: python3 -m ci_plan
