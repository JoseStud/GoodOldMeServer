name: Validate Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".gitmodules"
  push:
    paths:
      - "terraform/**"
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".gitmodules"

permissions:
  contents: read
  id-token: write
  checks: read
  statuses: read
  pull-requests: read

concurrency:
  group: validate-terraform-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  terraform-fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        root:
          - terraform/infra
          - terraform/oci
          - terraform/gcp
          - terraform/portainer-root
          - terraform/portainer

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (readonly lockfile)
        run: terraform -chdir=${{ matrix.root }} init -backend=false -lockfile=readonly -input=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.root }} validate

  cloud-runner-guard:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: Jux
    outputs:
      runner_label: ${{ steps.guard.outputs.runner_label }}

    steps:
      - name: Verify cloud runner guard
        id: guard
        env:
          CLOUD_STATIC_RUNNER_LABEL: ${{ vars.CLOUD_STATIC_RUNNER_LABEL }}
        run: |
          : "${CLOUD_STATIC_RUNNER_LABEL:?Missing required variable: CLOUD_STATIC_RUNNER_LABEL}"
          echo "runner_label=${CLOUD_STATIC_RUNNER_LABEL}" >> "${GITHUB_OUTPUT}"

  tfc-speculative-plan:
    if: github.actor != 'dependabot[bot]'
    needs: terraform-validate
    runs-on: ubuntu-latest
    environment: Jux
    env:
      TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
      TF_CLOUD_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap jq
        uses: ./.github/actions/bootstrap-query-tools
        with:
          install_jq: "true"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve workspace and validate required inputs
        id: preflight
        env:
          WORKSPACE_KEY: infra
          TFC_WORKSPACE_INFRA: ${{ vars.TFC_WORKSPACE_INFRA }}
          TFC_WORKSPACE_PORTAINER: ${{ vars.TFC_WORKSPACE_PORTAINER }}
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        run: .github/scripts/stages/tfc_speculative_preflight.sh

      - name: Upload configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.0.0
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          directory: terraform
          speculative: true

      - name: Create speculative run
        id: create-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          plan_only: true

      - name: Wait for Terraform Cloud run to complete
        env:
          RUN_ID: ${{ steps.create-run.outputs.run_id }}
          WORKSPACE_NAME: ${{ steps.preflight.outputs.workspace_name }}
          WAIT_TIMEOUT_SECONDS: ${{ vars.TFC_PLAN_WAIT_TIMEOUT_SECONDS || '7200' }}
          POLL_INTERVAL_SECONDS: ${{ vars.TFC_PLAN_POLL_INTERVAL_SECONDS || '10' }}
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        run: .github/scripts/tfc/wait_for_tfc_run.sh "${RUN_ID}" "${WORKSPACE_NAME}"

  portainer-live-plan:
    needs: [terraform-validate, cloud-runner-guard]
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}
    environment: Jux
    env:
      INFISICAL_MACHINE_IDENTITY_ID: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}
      INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
      TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
      TFC_WORKSPACE_PORTAINER: ${{ vars.TFC_WORKSPACE_PORTAINER || 'goodoldme-portainer' }}
      TF_VAR_infisical_project_id: ${{ vars.INFISICAL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure unzip is available
        run: command -v unzip || sudo apt-get update -qq && sudo apt-get install -yqq unzip

      - name: Ensure Infisical CLI is available
        run: |
          if ! command -v infisical >/dev/null 2>&1; then
            ARCH="$(dpkg --print-architecture 2>/dev/null || echo "amd64")"
            case "${ARCH}" in arm64|aarch64) INFISICAL_ARCH="arm64" ;; *) INFISICAL_ARCH="amd64" ;; esac
            # Infisical is a monorepo; releases/latest may return a non-CLI release.
            # List recent releases and pick the first infisical-cli tag.
            VERSION="$(curl -fsSL 'https://api.github.com/repos/Infisical/infisical/releases?per_page=50' \
              | grep '"tag_name"' | grep 'infisical-cli/v' | head -1 \
              | sed 's/.*infisical-cli\/v//;s/".*//')"
            if [[ -z "${VERSION}" ]]; then echo "Failed to resolve Infisical CLI version"; exit 1; fi
            curl -fsSL "https://github.com/Infisical/infisical/releases/download/infisical-cli%2Fv${VERSION}/infisical_${VERSION}_linux_${INFISICAL_ARCH}.tar.gz" \
              | sudo tar -xz -C /usr/local/bin infisical
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve stacks SHA
        id: stacks-sha
        run: echo "stacks_sha=$(git rev-parse HEAD:stacks)" >> "${GITHUB_OUTPUT}"

      - name: Validate required secret paths
        env:
          RUN_INFRA: "false"
          RUN_ANSIBLE: "false"
          RUN_PORTAINER: "true"
          RUN_HOST_SYNC: "false"
          RUN_HEALTH: "false"
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: .github/scripts/stages/secret_validation.sh

      - name: Build network access policy
        id: network-policy
        run: .github/scripts/network/build_network_access_policy.sh

      - name: Preflight egress + Portainer API reachability
        env:
          NETWORK_ACCESS_POLICY_JSON: ${{ steps.network-policy.outputs.network_access_policy_json }}
          RUN_HEALTH: "false"
          RUN_PORTAINER: "true"
          PORTAINER_ALLOWLIST_PROPAGATION_TIMEOUT_SECONDS: ${{ vars.PORTAINER_ALLOWLIST_PROPAGATION_TIMEOUT_SECONDS || '420' }}
          PORTAINER_ALLOWLIST_PROPAGATION_POLL_INTERVAL_SECONDS: ${{ vars.PORTAINER_ALLOWLIST_PROPAGATION_POLL_INTERVAL_SECONDS || '5' }}
        run: .github/scripts/stages/portainer_api_preflight.sh

      - name: Terraform Portainer plan (local operations mode)
        env:
          STACKS_SHA: ${{ steps.stacks-sha.outputs.stacks_sha }}
          SHADOW_MODE: "true"
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
        run: .github/scripts/stages/portainer_apply.sh
