name: Validate Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".gitmodules"
  push:
    paths:
      - "terraform/**"
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".gitmodules"

permissions:
  contents: read
  id-token: write
  checks: read
  statuses: read
  pull-requests: read

concurrency:
  group: validate-terraform-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  terraform-fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        root:
          - terraform/infra
          - terraform/oci
          - terraform/gcp
          - terraform/portainer-root
          - terraform/portainer

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init (readonly lockfile)
        run: terraform -chdir=${{ matrix.root }} init -backend=false -lockfile=readonly -input=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.root }} validate

  # portainer-live-plan (and cloud-runner-guard) were removed. That job ran
  # terraform/portainer-root plan in SHADOW_MODE on the cloud static runner to
  # give PR-time feedback. Removed because: (1) it was the sole reason the cloud
  # static runner existed, (2) terraform-validate already catches syntax/provider
  # errors, and (3) the orchestrator portainer-apply stage catches real failures
  # post-merge with full context. The cost of the allowlist-propagation wait
  # (~7 min) and a dedicated static-egress runner outweighed the marginal benefit
  # of a read-only plan. PORTAINER_API_URL now uses the Tailscale IP directly
  # (accessed via the Dagger pipeline's SOCKS5 proxy), making a cloud runner
  # with deterministic public-IP egress unnecessary.
  tfc-speculative-plan:
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    needs: terraform-validate
    runs-on: ubuntu-latest
    environment: Jux
    env:
      TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
      TF_CLOUD_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap jq
        uses: ./.github/actions/bootstrap-query-tools
        with:
          install_jq: "true"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Resolve workspace and validate required inputs
        id: preflight
        env:
          WORKSPACE_KEY: infra
          TFC_WORKSPACE_INFRA: ${{ vars.TFC_WORKSPACE_INFRA }}
          TFC_WORKSPACE_PORTAINER: ${{ vars.TFC_WORKSPACE_PORTAINER }}
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        run: .github/scripts/stages/tfc_speculative_preflight.sh

      - name: Upload configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          directory: terraform
          speculative: true

      - name: Create speculative run
        id: create-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          plan_only: true

      - name: Wait for Terraform Cloud run to complete
        env:
          RUN_ID: ${{ steps.create-run.outputs.run_id }}
          WORKSPACE_NAME: ${{ steps.preflight.outputs.workspace_name }}
          WAIT_TIMEOUT_SECONDS: ${{ vars.TFC_PLAN_WAIT_TIMEOUT_SECONDS || '7200' }}
          POLL_INTERVAL_SECONDS: ${{ vars.TFC_PLAN_POLL_INTERVAL_SECONDS || '10' }}
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        run: .github/scripts/tfc/wait_for_tfc_run.sh "${RUN_ID}" "${WORKSPACE_NAME}"
