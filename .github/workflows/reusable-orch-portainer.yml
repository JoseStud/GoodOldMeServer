name: Reusable Orchestrator Portainer

on:
  workflow_call:
    inputs:
      plan_json:
        required: true
        type: string
      runner_label:
        required: true
        type: string
      network_access_policy_json:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  INFISICAL_SSH_CA_ID: ${{ vars.INFISICAL_SSH_CA_ID }}
  SHADOW_MODE: ${{ vars.SHADOW_MODE || 'false' }}
  TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
  TFC_WORKSPACE_PORTAINER: ${{ vars.TFC_WORKSPACE_PORTAINER || 'goodoldme-portainer' }}

jobs:
  # Defensive: validates plan_json independently of upstream resolve-plan.
  validate-plan-json:
    runs-on: ubuntu-latest

    steps:
      - name: Validate plan_json is valid JSON with expected schema version
        env:
          PLAN_JSON: ${{ inputs.plan_json || '{}' }}
        run: |
          printf '%s' "${PLAN_JSON}" | jq -e . >/dev/null || { echo "Invalid JSON in inputs.plan_json"; exit 1; }
          schema_version="$(printf '%s' "${PLAN_JSON}" | jq -r '.plan_schema_version // ""')"
          if [[ -n "${schema_version}" && "${schema_version}" != "ci-plan-v1" ]]; then
            echo "Unexpected plan_schema_version: ${schema_version} (expected ci-plan-v1)"
            exit 1
          fi

  post-bootstrap-secret-check:
    needs: validate-plan-json
    if: ${{ fromJSON(inputs.plan_json || '{}').meta.stages.stage_post_bootstrap_secret_check }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap Infisical runner
        uses: ./.github/actions/bootstrap-tools
        with:
          install_infisical: "true"
          infisical_login: "true"
          infisical_machine_identity_id: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}

      - name: Validate bootstrap-managed Portainer secrets
        run: .github/scripts/stages/post_bootstrap_secret_check.sh

  portainer-api-preflight:
    needs: [post-bootstrap-secret-check]
    if: ${{ fromJSON(inputs.plan_json || '{}').meta.stages.stage_portainer_api_preflight && (needs.post-bootstrap-secret-check.result == 'success' || needs.post-bootstrap-secret-check.result == 'skipped') }}
    runs-on: ${{ inputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap Infisical runner
        uses: ./.github/actions/bootstrap-tools
        with:
          install_infisical: "true"
          infisical_login: "true"
          infisical_machine_identity_id: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}
          install_jq: "true"

      - name: Preflight egress + Portainer API reachability
        env:
          NETWORK_ACCESS_POLICY_JSON: ${{ inputs.network_access_policy_json }}
          RUN_HEALTH: ${{ fromJSON(inputs.plan_json || '{}').meta.run_health_redeploy }}
          RUN_PORTAINER: ${{ fromJSON(inputs.plan_json || '{}').meta.run_portainer_apply }}
          PORTAINER_ALLOWLIST_PROPAGATION_TIMEOUT_SECONDS: ${{ vars.PORTAINER_ALLOWLIST_PROPAGATION_TIMEOUT_SECONDS || '420' }}
          PORTAINER_ALLOWLIST_PROPAGATION_POLL_INTERVAL_SECONDS: ${{ vars.PORTAINER_ALLOWLIST_PROPAGATION_POLL_INTERVAL_SECONDS || '5' }}
        run: .github/scripts/stages/portainer_api_preflight.sh

  config-sync:
    needs: [post-bootstrap-secret-check]
    if: ${{ !cancelled() && fromJSON(inputs.plan_json || '{}').meta.stages.stage_config_sync && (needs.post-bootstrap-secret-check.result == 'success' || needs.post-bootstrap-secret-check.result == 'skipped') }}
    runs-on: ${{ inputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Bootstrap Ansible stage
        uses: ./.github/actions/bootstrap-tools
        with:
          install_infisical: "true"
          infisical_login: "true"
          infisical_machine_identity_id: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}

      - name: Download CI inventory artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-ci
          path: .

      - name: Sync stack configs only
        env:
          STACKS_SHA: ${{ fromJSON(inputs.plan_json || '{}').meta.stacks_sha }}
          INVENTORY_FILE: inventory-ci.yml
          ANSIBLE_TAGS: sync-configs
          ANSIBLE_TIMEOUT: ${{ vars.ANSIBLE_TIMEOUT || '30' }}
        run: .github/scripts/stages/ansible_run.sh

  portainer-apply:
    needs: [post-bootstrap-secret-check, portainer-api-preflight, config-sync]
    if: ${{ !cancelled() && fromJSON(inputs.plan_json || '{}').meta.stages.stage_portainer_apply && (needs.post-bootstrap-secret-check.result == 'success' || needs.post-bootstrap-secret-check.result == 'skipped') && needs.portainer-api-preflight.result == 'success' && (needs.config-sync.result == 'success' || needs.config-sync.result == 'skipped') }}
    runs-on: ${{ inputs.runner_label }}
    env:
      TF_VAR_infisical_project_id: ${{ vars.INFISICAL_PROJECT_ID }}
      STACKS_SHA: ${{ fromJSON(inputs.plan_json || '{}').meta.stacks_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap jq
        uses: ./.github/actions/bootstrap-tools
        with:
          install_jq: "true"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform plan/apply (local operations mode)
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: .github/scripts/stages/portainer_apply.sh

  health-gated-redeploy:
    needs: [portainer-api-preflight, portainer-apply, config-sync]
    if: ${{ fromJSON(inputs.plan_json || '{}').meta.stages.stage_health_gated_redeploy && needs.portainer-api-preflight.result == 'success' && needs.portainer-apply.result == 'success' && needs.config-sync.result == 'success' }}
    runs-on: ${{ inputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Bootstrap Ansible stage
        uses: ./.github/actions/bootstrap-tools
        with:
          install_infisical: "true"
          infisical_login: "true"
          infisical_machine_identity_id: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}
          install_yq: "true"
          install_gomplate: "true"

      - name: Trigger health-gated webhooks
        env:
          STACKS_SHA: ${{ fromJSON(inputs.plan_json || '{}').meta.stacks_sha }}
          FULL_STACKS_RECONCILE: "true"
        run: .github/scripts/stages/health_gated_redeploy.sh
