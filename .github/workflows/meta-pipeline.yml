name: Meta Pipeline

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".ansible-lint"
  repository_dispatch:
    types: [stacks-redeploy-requested]
  workflow_dispatch:
    inputs:
      run_infra_apply:
        description: "Create infra run and wait for manual confirm/apply in Terraform Cloud"
        required: false
        default: false
        type: boolean
      run_ansible_bootstrap:
        description: "Run Ansible provision playbook"
        required: false
        default: false
        type: boolean
      run_portainer_apply:
        description: "Run local Terraform apply for Portainer workspace (TFC remote state)"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Dry-run mode (non-mutating stages only)"
        required: false
        default: false
        type: boolean
      stacks_sha:
        description: "Optional stacks repository commit SHA"
        required: false
        type: string
      changed_stacks:
        description: "Comma-separated stack names for health-gated webhook redeploy"
        required: false
        type: string
      config_stacks:
        description: "Comma-separated stack names requiring config sync"
        required: false
        type: string
      structural_change:
        description: "Whether stack structure changed and Portainer apply is required"
        required: false
        default: false
        type: boolean
      reason:
        description: "Execution reason label"
        required: false
        default: "manual-dispatch"
        type: string
      changed_paths:
        description: "Optional CSV list of changed structural paths"
        required: false
        type: string
      break_glass_policy_json:
        description: "Optional break-glass override for network_access_policy JSON"
        required: false
        type: string
  workflow_call:
    inputs:
      run_infra_apply:
        required: false
        type: boolean
      run_ansible_bootstrap:
        required: false
        type: boolean
      run_portainer_apply:
        required: false
        type: boolean
      dry_run:
        required: false
        type: boolean
      stacks_sha:
        required: false
        type: string
      changed_stacks:
        required: false
        type: string
      config_stacks:
        required: false
        type: string
      structural_change:
        required: false
        type: boolean
      reason:
        required: false
        type: string
      changed_paths:
        required: false
        type: string
      break_glass_policy_json:
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  INFISICAL_MACHINE_IDENTITY_ID: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}
  INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
  INFISICAL_SSH_CA_ID: ${{ vars.INFISICAL_SSH_CA_ID }}
  TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
  TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
  TFC_WORKSPACE_INFRA: ${{ vars.TFC_WORKSPACE_INFRA || 'goodoldme-infra' }}
  TFC_WORKSPACE_PORTAINER: ${{ vars.TFC_WORKSPACE_PORTAINER || 'goodoldme-portainer' }}
  SHADOW_MODE: ${{ ((github.event_name == 'workflow_dispatch' && inputs.dry_run) || (github.event_name == 'workflow_call' && inputs.dry_run)) && 'true' || vars.SHADOW_MODE || 'false' }}

concurrency:
  group: meta-pipeline-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: false

jobs:
  resolve-context:
    runs-on: ubuntu-latest
    outputs:
      plan_json: ${{ steps.resolve.outputs.plan_json }}
      run_infra_apply: ${{ steps.resolve.outputs.run_infra_apply }}
      run_ansible_bootstrap: ${{ steps.resolve.outputs.run_ansible_bootstrap }}
      run_portainer_apply: ${{ steps.resolve.outputs.run_portainer_apply }}
      run_config_sync: ${{ steps.resolve.outputs.run_config_sync }}
      run_health_redeploy: ${{ steps.resolve.outputs.run_health_redeploy }}
      has_work: ${{ steps.resolve.outputs.has_work }}
      stacks_sha: ${{ steps.resolve.outputs.stacks_sha }}
      changed_stacks: ${{ steps.resolve.outputs.changed_stacks }}
      config_stacks: ${{ steps.resolve.outputs.config_stacks }}
      structural_change: ${{ steps.resolve.outputs.structural_change }}
      reason: ${{ steps.resolve.outputs.reason }}
      changed_paths: ${{ steps.resolve.outputs.changed_paths }}
      stage_cloud_runner_guard: ${{ steps.resolve.outputs.stage_cloud_runner_guard }}
      stage_secret_validation: ${{ steps.resolve.outputs.stage_secret_validation }}
      stage_network_policy_sync: ${{ steps.resolve.outputs.stage_network_policy_sync }}
      stage_infra_apply: ${{ steps.resolve.outputs.stage_infra_apply }}
      stage_inventory_handover: ${{ steps.resolve.outputs.stage_inventory_handover }}
      stage_network_preflight_ssh: ${{ steps.resolve.outputs.stage_network_preflight_ssh }}
      stage_ansible_bootstrap: ${{ steps.resolve.outputs.stage_ansible_bootstrap }}
      stage_post_bootstrap_secret_check: ${{ steps.resolve.outputs.stage_post_bootstrap_secret_check }}
      stage_portainer_api_preflight: ${{ steps.resolve.outputs.stage_portainer_api_preflight }}
      stage_portainer_apply: ${{ steps.resolve.outputs.stage_portainer_apply }}
      stage_config_sync: ${{ steps.resolve.outputs.stage_config_sync }}
      stage_health_gated_redeploy: ${{ steps.resolve.outputs.stage_health_gated_redeploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Load path filters config
        id: filter-config
        run: |
          {
            echo "filters<<EOF"
            cat .github/ci/path-filters.yml
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Detect changed paths
        id: path-filter
        if: ${{ github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' }}
        uses: dorny/paths-filter@v3
        with:
          filters: ${{ steps.filter-config.outputs.filters }}
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}

      - name: Validate repository_dispatch payload contract
        if: ${{ github.event_name == 'repository_dispatch' }}
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_SCHEMA_VERSION: ${{ github.event.client_payload.schema_version }}
          PAYLOAD_STACKS_SHA: ${{ github.event.client_payload.stacks_sha }}
          PAYLOAD_CHANGED_STACKS: ${{ github.event.client_payload.changed_stacks }}
          PAYLOAD_CONFIG_STACKS: ${{ github.event.client_payload.config_stacks }}
          PAYLOAD_STRUCTURAL_CHANGE: ${{ github.event.client_payload.structural_change }}
          PAYLOAD_REASON: ${{ github.event.client_payload.reason }}
          PAYLOAD_CHANGED_PATHS: ${{ github.event.client_payload.changed_paths }}
          PAYLOAD_SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          PAYLOAD_SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id }}
        run: .github/scripts/plan/validate_dispatch_payload.sh meta

      - name: Resolve execution context
        id: resolve
        env:
          CI_PLAN_MODE: meta
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
          INPUT_RUN_INFRA: ${{ inputs.run_infra_apply }}
          INPUT_RUN_ANSIBLE: ${{ inputs.run_ansible_bootstrap }}
          INPUT_RUN_PORTAINER: ${{ inputs.run_portainer_apply }}
          INPUT_STACKS_SHA: ${{ inputs.stacks_sha }}
          INPUT_CHANGED_STACKS: ${{ inputs.changed_stacks }}
          INPUT_CONFIG_STACKS: ${{ inputs.config_stacks }}
          INPUT_STRUCTURAL_CHANGE: ${{ inputs.structural_change }}
          INPUT_REASON: ${{ inputs.reason }}
          INPUT_CHANGED_PATHS: ${{ inputs.changed_paths }}
          PAYLOAD_STACKS_SHA: ${{ github.event.client_payload.stacks_sha }}
          PAYLOAD_CHANGED_STACKS: ${{ github.event.client_payload.changed_stacks }}
          PAYLOAD_CONFIG_STACKS: ${{ github.event.client_payload.config_stacks }}
          PAYLOAD_STRUCTURAL_CHANGE: ${{ github.event.client_payload.structural_change }}
          PAYLOAD_REASON: ${{ github.event.client_payload.reason }}
          PAYLOAD_CHANGED_PATHS: ${{ github.event.client_payload.changed_paths }}
          META_FILTER_APPLIED: ${{ steps.path-filter.outcome == 'success' && 'true' || 'false' }}
          META_INFRA_CHANGED: ${{ steps.path-filter.outputs.meta_infra }}
          META_ANSIBLE_CHANGED: ${{ steps.path-filter.outputs.meta_ansible }}
          META_PORTAINER_CHANGED: ${{ steps.path-filter.outputs.meta_portainer }}
          RESOLVE_STACKS_SHA_FROM_HEAD: "false"
          VALIDATE_DISPATCH_CONTRACT: "false"
        run: .github/scripts/plan/resolve_ci_plan.sh

  cloud-runner-guard:
    needs: [resolve-context]
    if: ${{ needs.resolve-context.outputs.stage_cloud_runner_guard == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      runner_label: ${{ steps.guard.outputs.runner_label }}

    steps:
      - name: Verify cloud runner guard
        id: guard
        env:
          CLOUD_STATIC_RUNNER_LABEL: ${{ vars.CLOUD_STATIC_RUNNER_LABEL }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          : "${CLOUD_STATIC_RUNNER_LABEL:?Missing required variable: CLOUD_STATIC_RUNNER_LABEL}"
          : "${INFISICAL_TOKEN:?Missing required secret: INFISICAL_TOKEN}"
          echo "runner_label=${CLOUD_STATIC_RUNNER_LABEL}" >> "${GITHUB_OUTPUT}"

  stacks-sha-trust:
    needs: [resolve-context]
    if: ${{ needs.resolve-context.outputs.stacks_sha != '' && (needs.resolve-context.outputs.stage_ansible_bootstrap == 'true' || needs.resolve-context.outputs.stage_config_sync == 'true' || needs.resolve-context.outputs.stage_health_gated_redeploy == 'true') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify trusted stacks SHA
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STACKS_REPO_READ_TOKEN: ${{ secrets.STACKS_REPO_READ_TOKEN }}
          WAIT_FOR_SUCCESS: "true"
          WAIT_TIMEOUT_SECONDS: ${{ vars.STACKS_SHA_TRUST_WAIT_TIMEOUT_SECONDS || '900' }}
          POLL_INTERVAL_SECONDS: ${{ vars.STACKS_SHA_TRUST_POLL_INTERVAL_SECONDS || '15' }}
        run: .github/scripts/stacks/verify_trusted_stacks_sha.sh "${{ needs.resolve-context.outputs.stacks_sha }}"

  secret-validation:
    needs: [resolve-context]
    if: ${{ needs.resolve-context.outputs.stage_secret_validation == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secret paths
        env:
          RUN_INFRA: ${{ needs.resolve-context.outputs.run_infra_apply }}
          RUN_ANSIBLE: ${{ needs.resolve-context.outputs.run_ansible_bootstrap }}
          RUN_PORTAINER: ${{ needs.resolve-context.outputs.run_portainer_apply }}
          RUN_HEALTH: ${{ needs.resolve-context.outputs.run_health_redeploy }}
        run: .github/scripts/stages/secret_validation.sh

  network-policy-sync:
    needs: [resolve-context, cloud-runner-guard, secret-validation]
    if: ${{ needs.resolve-context.outputs.stage_network_policy_sync == 'true' }}
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}
    outputs:
      network_access_policy_json: ${{ steps.sync.outputs.network_access_policy_json }}
      portainer_automation_allowed_cidrs: ${{ steps.sync.outputs.portainer_automation_allowed_cidrs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and sync network policy
        id: sync
        env:
          BREAK_GLASS_POLICY_JSON: ${{ inputs.break_glass_policy_json || github.event.client_payload.break_glass_policy_json }}
        run: .github/scripts/stages/network_policy_sync.sh

  infra-apply:
    needs: [resolve-context, secret-validation, network-policy-sync]
    if: ${{ needs.resolve-context.outputs.stage_infra_apply == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create Terraform Cloud Infra Run
        id: tfc-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        with:
          workspace: ${{ env.TFC_WORKSPACE_INFRA }}
          configuration_version: ${{ github.sha }}
          message: "Meta pipeline infra apply (${{ needs.resolve-context.outputs.reason }})"

      - name: Wait for Terraform Cloud infra run
        env:
          RUN_ID: ${{ steps.tfc-run.outputs.run_id }}
          TFC_WORKSPACE: ${{ env.TFC_WORKSPACE_INFRA }}
          WAIT_TIMEOUT_SECONDS: ${{ vars.TFC_INFRA_APPLY_WAIT_TIMEOUT_SECONDS || '7200' }}
          POLL_INTERVAL_SECONDS: ${{ vars.TFC_PLAN_POLL_INTERVAL_SECONDS || '10' }}
        run: .github/scripts/stages/infra_apply.sh

  inventory-handover:
    needs: [resolve-context, secret-validation, infra-apply]
    if: ${{ always() && needs.resolve-context.outputs.stage_inventory_handover == 'true' && (needs.infra-apply.result == 'success' || needs.infra-apply.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render deterministic Ansible inventory
        env:
          OUTPUT_FILE: inventory-ci.yml
          TFC_WORKSPACE_INFRA: ${{ env.TFC_WORKSPACE_INFRA }}
        run: .github/scripts/tfc/render_inventory_from_tfc_outputs.sh "${TFC_WORKSPACE_INFRA}" "${OUTPUT_FILE}"

      - name: Upload CI inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventory-ci
          path: inventory-ci.yml
          if-no-files-found: error

  network-preflight-ssh:
    needs: [resolve-context, cloud-runner-guard, secret-validation, network-policy-sync, inventory-handover]
    if: ${{ always() && needs.resolve-context.outputs.stage_network_preflight_ssh == 'true' && needs.inventory-handover.result == 'success' }}
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CI inventory artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-ci
          path: .

      - name: Preflight SSH access checks
        env:
          NETWORK_ACCESS_POLICY_JSON: ${{ needs.network-policy-sync.outputs.network_access_policy_json }}
          RUN_ANSIBLE: ${{ needs.resolve-context.outputs.run_ansible_bootstrap }}
          RUN_CONFIG: ${{ needs.resolve-context.outputs.run_config_sync }}
          RUN_HEALTH: "false"
          RUN_PORTAINER: "false"
          INVENTORY_FILE: inventory-ci.yml
        run: .github/scripts/network/preflight_network_access.sh

  ansible-bootstrap:
    needs: [resolve-context, stacks-sha-trust, secret-validation, cloud-runner-guard, network-preflight-ssh, inventory-handover]
    if: ${{ needs.resolve-context.outputs.stage_ansible_bootstrap == 'true' && (needs.stacks-sha-trust.result == 'success' || needs.stacks-sha-trust.result == 'skipped') }}
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download CI inventory artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-ci
          path: .

      - name: Run Ansible bootstrap
        env:
          STACKS_SHA: ${{ needs.resolve-context.outputs.stacks_sha }}
          INVENTORY_FILE: inventory-ci.yml
        run: .github/scripts/stages/ansible_run.sh

  post-bootstrap-secret-check:
    needs: [resolve-context, ansible-bootstrap]
    if: ${{ always() && needs.resolve-context.outputs.stage_post_bootstrap_secret_check == 'true' && (needs.ansible-bootstrap.result == 'success' || needs.ansible-bootstrap.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate bootstrap-managed Portainer secrets
        run: .github/scripts/stages/post_bootstrap_secret_check.sh

  portainer-api-preflight:
    needs: [resolve-context, cloud-runner-guard, secret-validation, network-policy-sync, post-bootstrap-secret-check]
    if: ${{ always() && needs.resolve-context.outputs.stage_portainer_api_preflight == 'true' && (needs.post-bootstrap-secret-check.result == 'success' || needs.post-bootstrap-secret-check.result == 'skipped') }}
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight egress + Portainer API reachability
        env:
          NETWORK_ACCESS_POLICY_JSON: ${{ needs.network-policy-sync.outputs.network_access_policy_json }}
          RUN_HEALTH: ${{ needs.resolve-context.outputs.run_health_redeploy }}
          RUN_PORTAINER: ${{ needs.resolve-context.outputs.run_portainer_apply }}
          PORTAINER_ALLOWLIST_PROPAGATION_TIMEOUT_SECONDS: ${{ vars.PORTAINER_ALLOWLIST_PROPAGATION_TIMEOUT_SECONDS || '420' }}
          PORTAINER_ALLOWLIST_PROPAGATION_POLL_INTERVAL_SECONDS: ${{ vars.PORTAINER_ALLOWLIST_PROPAGATION_POLL_INTERVAL_SECONDS || '5' }}
        run: .github/scripts/stages/portainer_api_preflight.sh

  portainer-apply:
    needs: [resolve-context, secret-validation, cloud-runner-guard, network-policy-sync, post-bootstrap-secret-check, portainer-api-preflight]
    if: ${{ needs.resolve-context.outputs.stage_portainer_apply == 'true' }}
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
      INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
      TF_VAR_infisical_project_id: ${{ vars.INFISICAL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform plan/apply (local operations mode)
        run: .github/scripts/stages/portainer_apply.sh

  config-sync:
    needs: [resolve-context, stacks-sha-trust, secret-validation, cloud-runner-guard, network-preflight-ssh, inventory-handover, portainer-apply]
    if: ${{ always() && needs.resolve-context.outputs.stage_config_sync == 'true' && (needs.stacks-sha-trust.result == 'success' || needs.stacks-sha-trust.result == 'skipped') && (needs.portainer-apply.result == 'success' || needs.portainer-apply.result == 'skipped') }}
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download CI inventory artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-ci
          path: .

      - name: Sync stack configs only
        env:
          STACKS_SHA: ${{ needs.resolve-context.outputs.stacks_sha }}
          INVENTORY_FILE: inventory-ci.yml
          ANSIBLE_TAGS: sync-configs
        run: .github/scripts/stages/ansible_run.sh

  health-gated-redeploy:
    needs: [resolve-context, stacks-sha-trust, secret-validation, cloud-runner-guard, portainer-api-preflight, portainer-apply, config-sync]
    if: ${{ always() && needs.resolve-context.outputs.stage_health_gated_redeploy == 'true' && (needs.stacks-sha-trust.result == 'success' || needs.stacks-sha-trust.result == 'skipped') && (needs.portainer-apply.result == 'success' || needs.portainer-apply.result == 'skipped') && (needs.config-sync.result == 'success' || needs.config-sync.result == 'skipped') }}
    runs-on: ${{ needs.cloud-runner-guard.outputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Trigger health-gated webhooks
        env:
          STACKS_SHA: ${{ needs.resolve-context.outputs.stacks_sha }}
          STACKS_CSV: ${{ needs.resolve-context.outputs.changed_stacks }}
        run: .github/scripts/stages/health_gated_redeploy.sh
