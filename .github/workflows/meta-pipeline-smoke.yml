name: Meta Pipeline Smoke

on:
  workflow_dispatch:
    inputs:
      run_infra_apply:
        description: "Simulate infra apply intent"
        required: false
        default: false
        type: boolean
      run_ansible_bootstrap:
        description: "Simulate ansible bootstrap intent"
        required: false
        default: false
        type: boolean
      run_portainer_apply:
        description: "Simulate local Portainer apply intent"
        required: false
        default: false
        type: boolean
      stacks_sha:
        description: "Optional stacks SHA to validate (40-char hex)"
        required: false
        type: string
      changed_stacks:
        description: "Comma-separated stacks (example: gateway,auth)"
        required: false
        type: string
      config_stacks:
        description: "Comma-separated config-only stacks"
        required: false
        type: string
      structural_change:
        description: "Simulate structural change flag"
        required: false
        default: false
        type: boolean
      reason:
        description: "Reason label"
        required: false
        default: "manual-smoke"
        type: string
      changed_paths:
        description: "Comma-separated changed paths"
        required: false
        type: string
  repository_dispatch:
    types:
      - stacks-redeploy-smoke-requested
  push:
    branches:
      - main
    paths:
      - ".github/ci/**"
      - ".github/workflows/meta-pipeline.yml"
      - ".github/workflows/meta-pipeline-smoke.yml"

permissions:
  contents: read

concurrency:
  group: meta-pipeline-smoke-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  resolve-context-smoke:
    runs-on: ubuntu-latest
    outputs:
      run_infra_apply: ${{ steps.resolve.outputs.run_infra_apply }}
      run_ansible_bootstrap: ${{ steps.resolve.outputs.run_ansible_bootstrap }}
      run_portainer_apply: ${{ steps.resolve.outputs.run_portainer_apply }}
      run_config_sync: ${{ steps.resolve.outputs.run_config_sync }}
      run_health_redeploy: ${{ steps.resolve.outputs.run_health_redeploy }}
      has_work: ${{ steps.resolve.outputs.has_work }}
      stacks_sha: ${{ steps.resolve.outputs.stacks_sha }}
      changed_stacks: ${{ steps.resolve.outputs.changed_stacks }}
      config_stacks: ${{ steps.resolve.outputs.config_stacks }}
      structural_change: ${{ steps.resolve.outputs.structural_change }}
      reason: ${{ steps.resolve.outputs.reason }}
      changed_paths: ${{ steps.resolve.outputs.changed_paths }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate payload contract
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_STACKS_SHA: ${{ inputs.stacks_sha }}
          INPUT_CHANGED_STACKS: ${{ inputs.changed_stacks }}
          INPUT_CONFIG_STACKS: ${{ inputs.config_stacks }}
          INPUT_STRUCTURAL_CHANGE: ${{ inputs.structural_change }}
          INPUT_REASON: ${{ inputs.reason }}
          INPUT_CHANGED_PATHS: ${{ inputs.changed_paths }}
          PAYLOAD_STACKS_SHA: ${{ github.event.client_payload.stacks_sha }}
          PAYLOAD_CHANGED_STACKS: ${{ github.event.client_payload.changed_stacks }}
          PAYLOAD_CONFIG_STACKS: ${{ github.event.client_payload.config_stacks }}
          PAYLOAD_STRUCTURAL_CHANGE: ${{ github.event.client_payload.structural_change }}
          PAYLOAD_REASON: ${{ github.event.client_payload.reason }}
          PAYLOAD_CHANGED_PATHS: ${{ github.event.client_payload.changed_paths }}
        run: |
          set -euo pipefail

          validate_sha() {
            local sha="${1:-}"
            if [[ -z "$sha" || "$sha" == "null" ]]; then
              return
            fi
            if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Invalid stacks_sha: '$sha' (must be 40-char lowercase hex)."
              exit 1
            fi
          }

          validate_stack_csv() {
            local csv="${1:-}"
            if [[ -z "$csv" || "$csv" == "null" ]]; then
              return
            fi
            if ! [[ "$csv" =~ ^[a-z0-9][a-z0-9-]*(,[a-z0-9][a-z0-9-]*)*$ ]]; then
              echo "Invalid stack CSV: '$csv' (expected: stack-a,stack-b)."
              exit 1
            fi
          }

          validate_paths_csv() {
            local csv="${1:-}"
            if [[ -z "$csv" || "$csv" == "null" ]]; then
              return
            fi
            if [[ "$csv" =~ [[:space:]] || "$csv" == *",,"* || "$csv" == ,* || "$csv" == *, ]]; then
              echo "Invalid changed_paths CSV: '$csv'."
              exit 1
            fi
          }

          validate_reason() {
            local reason="${1:-}"
            if [[ -z "$reason" || "$reason" == "null" ]]; then
              return
            fi
            case "$reason" in
              structural-change|manual-refresh|content-change|infra-repo-push|infra-reconcile|portainer-reconcile|manual-dispatch|manual-smoke|no-op)
                ;;
              *)
                echo "Invalid reason '$reason'."
                echo "Allowed: structural-change, manual-refresh, content-change, infra-repo-push, infra-reconcile, portainer-reconcile, manual-dispatch, manual-smoke, no-op"
                exit 1
                ;;
            esac
          }

          stacks_sha=""
          changed_stacks=""
          config_stacks=""
          structural_change=""
          reason=""
          changed_paths=""

          if [[ "$EVENT_NAME" == "repository_dispatch" ]]; then
            stacks_sha="${PAYLOAD_STACKS_SHA}"
            changed_stacks="${PAYLOAD_CHANGED_STACKS}"
            config_stacks="${PAYLOAD_CONFIG_STACKS}"
            structural_change="${PAYLOAD_STRUCTURAL_CHANGE}"
            reason="${PAYLOAD_REASON}"
            changed_paths="${PAYLOAD_CHANGED_PATHS}"

            if [[ -z "${stacks_sha}" || "${stacks_sha}" == "null" ]]; then
              echo "repository_dispatch payload must include non-empty client_payload.stacks_sha."
              exit 1
            fi

            if [[ -z "${reason}" || "${reason}" == "null" ]]; then
              echo "repository_dispatch payload must include non-empty client_payload.reason."
              exit 1
            fi

            if [[ -z "${structural_change}" || "${structural_change}" == "null" ]]; then
              echo "repository_dispatch payload must include client_payload.structural_change."
              exit 1
            fi
          else
            stacks_sha="${INPUT_STACKS_SHA}"
            changed_stacks="${INPUT_CHANGED_STACKS}"
            config_stacks="${INPUT_CONFIG_STACKS}"
            structural_change="${INPUT_STRUCTURAL_CHANGE}"
            reason="${INPUT_REASON}"
            changed_paths="${INPUT_CHANGED_PATHS}"
          fi

          validate_sha "$stacks_sha"
          validate_stack_csv "$changed_stacks"
          validate_stack_csv "$config_stacks"
          validate_paths_csv "$changed_paths"
          validate_reason "$reason"

          if [[ -n "$structural_change" && "$structural_change" != "null" ]]; then
            case "${structural_change,,}" in
              true|false|1|0|yes|no) ;;
              *)
                echo "Invalid structural_change '$structural_change'."
                exit 1
                ;;
            esac
          fi

          echo "Payload validation passed."

      - name: Load path filters config
        id: filter-config
        run: |
          {
            echo "filters<<EOF"
            cat .github/ci/path-filters.yml
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Detect changed paths
        id: path-filter
        if: ${{ github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' }}
        uses: dorny/paths-filter@v3
        with:
          filters: ${{ steps.filter-config.outputs.filters }}
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}

      - name: Resolve execution context (dry-run)
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}

          INPUT_RUN_INFRA: ${{ inputs.run_infra_apply }}
          INPUT_RUN_ANSIBLE: ${{ inputs.run_ansible_bootstrap }}
          INPUT_RUN_PORTAINER: ${{ inputs.run_portainer_apply }}
          INPUT_STACKS_SHA: ${{ inputs.stacks_sha }}
          INPUT_CHANGED_STACKS: ${{ inputs.changed_stacks }}
          INPUT_CONFIG_STACKS: ${{ inputs.config_stacks }}
          INPUT_STRUCTURAL_CHANGE: ${{ inputs.structural_change }}
          INPUT_REASON: ${{ inputs.reason }}
          INPUT_CHANGED_PATHS: ${{ inputs.changed_paths }}

          PAYLOAD_STACKS_SHA: ${{ github.event.client_payload.stacks_sha }}
          PAYLOAD_CHANGED_STACKS: ${{ github.event.client_payload.changed_stacks }}
          PAYLOAD_CONFIG_STACKS: ${{ github.event.client_payload.config_stacks }}
          PAYLOAD_STRUCTURAL_CHANGE: ${{ github.event.client_payload.structural_change }}
          PAYLOAD_REASON: ${{ github.event.client_payload.reason }}
          PAYLOAD_CHANGED_PATHS: ${{ github.event.client_payload.changed_paths }}
          META_FILTER_APPLIED: ${{ steps.path-filter.outcome == 'success' && 'true' || 'false' }}
          META_INFRA_CHANGED: ${{ steps.path-filter.outputs.meta_infra }}
          META_ANSIBLE_CHANGED: ${{ steps.path-filter.outputs.meta_ansible }}
          META_PORTAINER_CHANGED: ${{ steps.path-filter.outputs.meta_portainer }}
          RESOLVE_STACKS_SHA_FROM_HEAD: "false"
        run: .github/scripts/resolve_meta_context.sh

      - name: Print dry-run result
        run: |
          echo "This workflow is a smoke test. No deployment actions are executed."
          echo "run_infra_apply=${{ steps.resolve.outputs.run_infra_apply }}"
          echo "run_ansible_bootstrap=${{ steps.resolve.outputs.run_ansible_bootstrap }}"
          echo "run_portainer_apply=${{ steps.resolve.outputs.run_portainer_apply }}"
          echo "run_config_sync=${{ steps.resolve.outputs.run_config_sync }}"
          echo "run_health_redeploy=${{ steps.resolve.outputs.run_health_redeploy }}"
          echo "has_work=${{ steps.resolve.outputs.has_work }}"
          echo "stacks_sha=${{ steps.resolve.outputs.stacks_sha }}"
          echo "changed_stacks=${{ steps.resolve.outputs.changed_stacks }}"
          echo "config_stacks=${{ steps.resolve.outputs.config_stacks }}"
          echo "structural_change=${{ steps.resolve.outputs.structural_change }}"
          echo "reason=${{ steps.resolve.outputs.reason }}"
          echo "changed_paths=${{ steps.resolve.outputs.changed_paths }}"
