name: Reusable Orchestrator Ansible

on:
  workflow_call:
    inputs:
      plan_json:
        required: true
        type: string
      runner_label:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  INFISICAL_MACHINE_IDENTITY_ID: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}
  INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
  INFISICAL_SSH_CA_ID: ${{ vars.INFISICAL_SSH_CA_ID }}
  SHADOW_MODE: ${{ vars.SHADOW_MODE || 'false' }}

jobs:
  # Defensive: validates plan_json independently of upstream resolve-plan.
  validate-plan-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate plan_json
        env:
          PLAN_JSON: ${{ inputs.plan_json }}
        run: bash .github/scripts/plan/validate_plan_json.sh

  ansible-bootstrap:
    needs: validate-plan-json
    if: ${{ fromJSON(inputs.plan_json || '{}').meta.stages.stage_ansible_bootstrap }}
    runs-on: ${{ inputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download CI inventory artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-ci
          path: .

      - name: Run Ansible bootstrap
        env:
          STACKS_SHA: ${{ fromJSON(inputs.plan_json || '{}').meta.stacks_sha }}
          INVENTORY_FILE: inventory-ci.yml
          ANSIBLE_TIMEOUT: ${{ vars.ANSIBLE_TIMEOUT || '30' }}
          INFISICAL_AGENT_CLIENT_ID: ${{ secrets.INFISICAL_AGENT_CLIENT_ID }}
          INFISICAL_AGENT_CLIENT_SECRET: ${{ secrets.INFISICAL_AGENT_CLIENT_SECRET }}
        run: .github/scripts/stages/ansible_run.sh

  # stage_host_sync and stage_ansible_bootstrap are mutually exclusive
  # (enforced by resolve_meta_plan.sh:105-109), so no dependency needed.
  host-sync:
    needs: validate-plan-json
    if: ${{ fromJSON(inputs.plan_json || '{}').meta.stages.stage_host_sync }}
    runs-on: ${{ inputs.runner_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download CI inventory artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-ci
          path: .

      - name: Sync host runtime assets
        env:
          STACKS_SHA: ${{ fromJSON(inputs.plan_json || '{}').meta.stacks_sha }}
          INVENTORY_FILE: inventory-ci.yml
          ANSIBLE_TAGS: phase7_runtime_sync
          ANSIBLE_TIMEOUT: ${{ vars.ANSIBLE_TIMEOUT || '30' }}
          INFISICAL_AGENT_CLIENT_ID: ${{ secrets.INFISICAL_AGENT_CLIENT_ID }}
          INFISICAL_AGENT_CLIENT_SECRET: ${{ secrets.INFISICAL_AGENT_CLIENT_SECRET }}
        run: .github/scripts/stages/ansible_run.sh
