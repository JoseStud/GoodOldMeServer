name: Orchestrator

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "stacks"
      - ".gitmodules"
      - "ansible/**"
      - ".ansible-lint"
  repository_dispatch:
    types: [stacks-redeploy-intent-v5]
  workflow_dispatch:
    inputs:
      ansible_only:
        description: "Skip Terraform infra-apply (Ansible + Portainer only)"
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

# Concurrency note: repository_dispatch events have no github.ref_name, so
# they fall back to 'main' — sharing the same group as push-to-main.  With
# cancel-in-progress: false, a dispatch arriving during a long push-triggered
# run (e.g. TFC apply) will queue rather than cancel it.
concurrency:
  group: infra-orchestrator-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: false

jobs:
  compute-context:
    runs-on: ubuntu-latest
    outputs:
      run_infra_apply: ${{ steps.compute.outputs.run_infra_apply }}
      run_ansible_bootstrap: ${{ steps.compute.outputs.run_ansible_bootstrap }}
      run_portainer_apply: ${{ steps.compute.outputs.run_portainer_apply }}
      run_host_sync: ${{ steps.compute.outputs.run_host_sync }}
      run_config_sync: ${{ steps.compute.outputs.run_config_sync }}
      run_health_redeploy: ${{ steps.compute.outputs.run_health_redeploy }}
      has_work: ${{ steps.compute.outputs.has_work }}
      stacks_sha: ${{ steps.compute.outputs.stacks_sha }}
      ansible_tags: ${{ steps.compute.outputs.ansible_tags }}
      reason: ${{ steps.compute.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute execution context
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_ANSIBLE_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.ansible_only }}
          PUSH_BEFORE: ${{ github.event.before || '' }}
          PUSH_SHA: ${{ github.sha }}
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
          PAYLOAD_STACKS_SHA: ${{ github.event.client_payload.stacks_sha }}
          PAYLOAD_REASON: ${{ github.event.client_payload.reason }}
          PAYLOAD_SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          PAYLOAD_SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id }}
          PAYLOAD_SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
        run: python3 -m ci_pipeline.context
        working-directory: ci/src

  preflight:
    needs: [compute-context]
    uses: ./.github/workflows/reusable-orch-preflight.yml
    secrets: inherit
    with:
      has_work: ${{ needs['compute-context'].outputs.has_work == 'true' }}
      stacks_sha: ${{ needs['compute-context'].outputs.stacks_sha }}
      run_infra_apply: ${{ needs['compute-context'].outputs.run_infra_apply == 'true' }}
      run_ansible_bootstrap: ${{ needs['compute-context'].outputs.run_ansible_bootstrap == 'true' }}
      run_portainer_apply: ${{ needs['compute-context'].outputs.run_portainer_apply == 'true' }}
      run_host_sync: ${{ needs['compute-context'].outputs.run_host_sync == 'true' }}
      run_health_redeploy: ${{ needs['compute-context'].outputs.run_health_redeploy == 'true' }}

  infra:
    needs: [compute-context, preflight]
    uses: ./.github/workflows/reusable-orch-infra.yml
    secrets: inherit
    with:
      run_infra_apply: ${{ needs['compute-context'].outputs.run_infra_apply == 'true' }}
      run_ansible_bootstrap: ${{ needs['compute-context'].outputs.run_ansible_bootstrap == 'true' }}
      run_host_sync: ${{ needs['compute-context'].outputs.run_host_sync == 'true' }}
      run_config_sync: ${{ needs['compute-context'].outputs.run_config_sync == 'true' }}
      reason: ${{ needs['compute-context'].outputs.reason }}
      runner_label: ${{ needs['preflight'].outputs.runner_label }}
      network_access_policy_json: ${{ needs['preflight'].outputs.network_access_policy_json }}

  ansible:
    needs: [compute-context, preflight, infra]
    uses: ./.github/workflows/reusable-orch-ansible.yml
    secrets: inherit
    with:
      run_ansible_bootstrap: ${{ needs['compute-context'].outputs.run_ansible_bootstrap == 'true' }}
      run_host_sync: ${{ needs['compute-context'].outputs.run_host_sync == 'true' }}
      stacks_sha: ${{ needs['compute-context'].outputs.stacks_sha }}
      ansible_tags: ${{ needs['compute-context'].outputs.ansible_tags }}
      runner_label: ${{ needs['preflight'].outputs.runner_label }}

  portainer:
    needs: [compute-context, preflight, ansible]
    uses: ./.github/workflows/reusable-orch-portainer.yml
    secrets: inherit
    with:
      run_portainer_apply: ${{ needs['compute-context'].outputs.run_portainer_apply == 'true' }}
      run_health_redeploy: ${{ needs['compute-context'].outputs.run_health_redeploy == 'true' }}
      run_config_sync: ${{ needs['compute-context'].outputs.run_config_sync == 'true' }}
      stacks_sha: ${{ needs['compute-context'].outputs.stacks_sha }}
      runner_label: ${{ needs['preflight'].outputs.runner_label }}
      network_access_policy_json: ${{ needs['preflight'].outputs.network_access_policy_json }}
