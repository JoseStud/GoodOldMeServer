name: Orchestrator

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "stacks"
      - ".gitmodules"
      - "ansible/**"
      - ".ansible-lint"
  repository_dispatch:
    types: [stacks-redeploy-intent-v5]
  workflow_dispatch:
    inputs:
      ansible_only:
        description: "Skip Terraform infra-apply (Ansible + Portainer only)"
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

# Concurrency note: repository_dispatch events have no github.ref_name, so
# they fall back to 'main' — sharing the same group as push-to-main.  With
# cancel-in-progress: false, a dispatch arriving during a long push-triggered
# run (e.g. TFC apply) will queue rather than cancel it.
concurrency:
  group: infra-orchestrator-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: false

jobs:
  compute-context:
    runs-on: ubuntu-latest
    outputs:
      run_infra_apply: ${{ steps.compute.outputs.run_infra_apply }}
      run_ansible_bootstrap: ${{ steps.compute.outputs.run_ansible_bootstrap }}
      run_portainer_apply: ${{ steps.compute.outputs.run_portainer_apply }}
      run_host_sync: ${{ steps.compute.outputs.run_host_sync }}
      run_config_sync: ${{ steps.compute.outputs.run_config_sync }}
      run_health_redeploy: ${{ steps.compute.outputs.run_health_redeploy }}
      has_work: ${{ steps.compute.outputs.has_work }}
      stacks_sha: ${{ steps.compute.outputs.stacks_sha }}
      ansible_tags: ${{ steps.compute.outputs.ansible_tags }}
      reason: ${{ steps.compute.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute execution context
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_ANSIBLE_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.ansible_only }}
          PUSH_BEFORE: ${{ github.event.before || '' }}
          PUSH_SHA: ${{ github.sha }}
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
          PAYLOAD_STACKS_SHA: ${{ github.event.client_payload.stacks_sha }}
          PAYLOAD_REASON: ${{ github.event.client_payload.reason }}
          PAYLOAD_SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          PAYLOAD_SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id }}
          PAYLOAD_SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
        run: python3 -m ci_pipeline.context
        working-directory: ci/src

  # ── infra-apply: GHA marketplace actions (TFC API only, no Tailscale) ──

  infra-apply:
    if: ${{ needs['compute-context'].outputs.run_infra_apply == 'true' }}
    needs: [compute-context]
    runs-on: ubuntu-latest
    environment: Jux
    timeout-minutes: 150
    env:
      SHADOW_MODE: ${{ vars.SHADOW_MODE || 'false' }}
      TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
      TF_CLOUD_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
      TFC_WORKSPACE_INFRA: ${{ vars.TFC_WORKSPACE_INFRA || 'goodoldme-infra' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap jq
        uses: ./.github/actions/bootstrap-query-tools
        with:
          install_jq: "true"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Upload infra configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.0.0
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        with:
          workspace: ${{ env.TFC_WORKSPACE_INFRA }}
          directory: terraform

      - name: Create Terraform Cloud Infra Run
        id: tfc-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
        with:
          workspace: ${{ env.TFC_WORKSPACE_INFRA }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          message: Infrastructure orchestrator infra apply (${{ needs['compute-context'].outputs.reason }})

      - name: Wait for Terraform Cloud infra run
        env:
          RUN_ID: ${{ steps.tfc-run.outputs.run_id }}
          TFC_WORKSPACE: ${{ env.TFC_WORKSPACE_INFRA }}
          WAIT_TIMEOUT_SECONDS: ${{ vars.TFC_INFRA_APPLY_WAIT_TIMEOUT_SECONDS || '7200' }}
          POLL_INTERVAL_SECONDS: ${{ vars.TFC_PLAN_POLL_INTERVAL_SECONDS || '10' }}
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
        run: .github/scripts/stages/infra_apply.sh

  # ── Dagger pipeline: Tailscale OIDC + containerized stages ──
  # !cancelled(): infra-apply may be skipped (ansible-only push).
  # Without !cancelled(), GHA would skip this job too.
  dagger-pipeline:
    if: ${{ !cancelled() && needs['compute-context'].outputs.has_work == 'true' && needs['compute-context'].result == 'success' && (needs['infra-apply'].result == 'success' || needs['infra-apply'].result == 'skipped') }}
    needs: [compute-context, infra-apply]
    runs-on: ubuntu-latest
    environment: Jux
    timeout-minutes: 120
    env:
      SHADOW_MODE: ${{ vars.SHADOW_MODE || 'false' }}
      TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
      TFC_WORKSPACE_INFRA: ${{ vars.TFC_WORKSPACE_INFRA || 'goodoldme-infra' }}
      TFC_WORKSPACE_PORTAINER: ${{ vars.TFC_WORKSPACE_PORTAINER || 'goodoldme-portainer' }}
      INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
      INFISICAL_MACHINE_IDENTITY_ID: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}
      INFISICAL_OIDC_AUDIENCE: ${{ vars.INFISICAL_OIDC_AUDIENCE }}
      SSH_CERT_PRINCIPALS: ${{ vars.SSH_CERT_PRINCIPALS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Connect to Tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ vars.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Enable Tailscale SOCKS5 proxy on localhost:1055
        run: |
          # tailscale/github-action@v3 connects the runner to Tailscale but
          # does not start the SOCKS5 proxy. Enable it explicitly so Dagger
          # containers can route Tailscale-internal traffic (Portainer API,
          # webhook URLs) through the proxy service binding.
          sudo tailscale set --socks5-server=localhost:1055
          timeout 10 bash -c 'until nc -z 127.0.0.1 1055 2>/dev/null; do sleep 0.5; done'
          echo "Tailscale SOCKS5 proxy listening on 127.0.0.1:1055"

      - name: Ensure localhost resolves to IPv4 for Dagger host service
        run: |
          # Dagger's host service tunnel dials via Go's net package, which on
          # Ubuntu resolves "localhost" to ::1 first (from /etc/hosts). The
          # Tailscale SOCKS5 proxy binds on 127.0.0.1 (IPv4 only). Removing
          # the ::1 entry forces Go to use 127.0.0.1.
          sudo sed -i '/^::1[[:space:]]/d' /etc/hosts
          echo "localhost resolution after patch:"
          getent hosts localhost

      - name: Install Dagger
        uses: dagger/dagger-for-github@v7
        with:
          verb: version

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Install pipeline and Ansible dependencies
        run: |
          pip install ./ci
          pip install ansible-core==${{ vars.ANSIBLE_CORE_VERSION || '2.20.2' }}

      - name: Run Dagger pipeline
        env:
          # Execution context (from compute-context job)
          RUN_INFRA_APPLY: ${{ needs['compute-context'].outputs.run_infra_apply }}
          RUN_ANSIBLE_BOOTSTRAP: ${{ needs['compute-context'].outputs.run_ansible_bootstrap }}
          RUN_PORTAINER_APPLY: ${{ needs['compute-context'].outputs.run_portainer_apply }}
          RUN_HOST_SYNC: ${{ needs['compute-context'].outputs.run_host_sync }}
          RUN_CONFIG_SYNC: ${{ needs['compute-context'].outputs.run_config_sync }}
          RUN_HEALTH_REDEPLOY: ${{ needs['compute-context'].outputs.run_health_redeploy }}
          HAS_WORK: ${{ needs['compute-context'].outputs.has_work }}
          STACKS_SHA: ${{ needs['compute-context'].outputs.stacks_sha }}
          ANSIBLE_TAGS: ${{ needs['compute-context'].outputs.ansible_tags }}
          REASON: ${{ needs['compute-context'].outputs.reason }}
          # Secrets
          GITHUB_TOKEN: ${{ github.token }}
          STACKS_REPO_READ_TOKEN: ${{ secrets.STACKS_REPO_READ_TOKEN }}
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_AGENT_CLIENT_ID: ${{ secrets.INFISICAL_AGENT_CLIENT_ID }}
          INFISICAL_AGENT_CLIENT_SECRET: ${{ secrets.INFISICAL_AGENT_CLIENT_SECRET }}
        run: dagger run python -m ci_pipeline
