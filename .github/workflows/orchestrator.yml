name: Orchestrator

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "stacks"
      - ".gitmodules"
      - "ansible/**"
      - ".ansible-lint"
  repository_dispatch:
    types: [stacks-redeploy-intent-v5]
  workflow_dispatch:
    inputs:
      ansible_only:
        description: "Skip Terraform infra-apply (Ansible + Portainer only)"
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

# Concurrency note: repository_dispatch events have no github.ref_name, so
# they fall back to 'main' — sharing the same group as push-to-main.  With
# cancel-in-progress: false, a dispatch arriving during a long push-triggered
# run (e.g. TFC apply) will queue rather than cancel it.
concurrency:
  group: infra-orchestrator-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: false

jobs:
  resolve-context:
    uses: ./.github/workflows/reusable-resolve-plan.yml
    with:
      source_event_name: ${{ (github.event_name == 'workflow_dispatch' && inputs.ansible_only) && 'dispatch_ansible_only' || github.event_name }}
      push_before: ${{ github.event.before || '' }}
      push_sha: ${{ github.sha }}
      dispatch_payload_json: ${{ toJson(github.event.client_payload) }}
      dispatch_stacks_sha: ${{ github.event.client_payload.stacks_sha }}
      dispatch_reason: ${{ github.event.client_payload.reason }}
      dispatch_source_repo: ${{ github.event.client_payload.source_repo }}
      dispatch_source_run_id: ${{ github.event.client_payload.source_run_id }}
      dispatch_source_sha: ${{ github.event.client_payload.source_sha }}

  preflight:
    needs: [resolve-context]
    uses: ./.github/workflows/reusable-orch-preflight.yml
    secrets: inherit
    with:
      plan_json: ${{ needs.resolve-context.outputs.plan_json }}

  infra:
    needs: [resolve-context, preflight]
    uses: ./.github/workflows/reusable-orch-infra.yml
    secrets: inherit
    with:
      plan_json: ${{ needs.resolve-context.outputs.plan_json }}
      runner_label: ${{ needs.preflight.outputs.runner_label }}
      network_access_policy_json: ${{ needs.preflight.outputs.network_access_policy_json }}

  ansible:
    needs: [resolve-context, preflight, infra]
    uses: ./.github/workflows/reusable-orch-ansible.yml
    secrets: inherit
    with:
      plan_json: ${{ needs.resolve-context.outputs.plan_json }}
      runner_label: ${{ needs.preflight.outputs.runner_label }}

  portainer:
    needs: [resolve-context, preflight, ansible]
    uses: ./.github/workflows/reusable-orch-portainer.yml
    secrets: inherit
    with:
      plan_json: ${{ needs.resolve-context.outputs.plan_json }}
      runner_label: ${{ needs.preflight.outputs.runner_label }}
      network_access_policy_json: ${{ needs.preflight.outputs.network_access_policy_json }}
