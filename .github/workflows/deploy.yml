name: Secure Automated Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'ansible/**'
      - 'stacks/**'

# Required to allow GitHub to request OIDC JWT tokens for GCP, OCI, and Infisical
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate to Infisical via OIDC to get short-lived tokens and setup CLI
      - name: Setup Infisical
        run: |
          curl -1sLf 'https://artifacts-infisical-core.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical-core

      - name: Infisical OIDC Login
        run: |
          infisical login --method=oidc --oidc-client-id=${{ vars.INFISICAL_MACHINE_IDENTITY_ID }} --domain="https://app.infisical.com"

      # 2. Setup Terraform with TFC OIDC and wait for Terraform Cloud run
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Wait for Terraform Cloud Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        id: tfc-run
        with:
          workspace: ${{ vars.TFC_WORKSPACE }}
          configuration_version: ${{ github.sha }}
          message: "Triggered from GitHub Actions"

      # 3. Issue Ephemeral SSH Certificate via Infisical PKI
      - name: Generate Ephemeral SSH Certificate
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
          infisical pki sign ssh --public-key=~/.ssh/id_rsa.pub --project-id=${{ vars.INFISICAL_PROJECT_ID }} --env=prod > ~/.ssh/id_rsa-cert.pub

      # 4. Run Ansible with explicit inventory
      - name: Run Ansible Playbooks
        run: |
          infisical run --projectId=${{ vars.INFISICAL_PROJECT_ID }} --env=prod -- ansible-playbook -i ansible/inventory/terraform.yml ansible/playbooks/provision.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_SSH_ARGS: "-o CertificateFile=~/.ssh/id_rsa-cert.pub -i ~/.ssh/id_rsa"
