name: Secure Automated Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'ansible/**'
      - 'stacks/**'

# Required to allow GitHub to request OIDC JWT tokens for GCP, OCI, and Infisical
permissions:
  id-token: write
  contents: read

jobs:
  # ── Infrastructure & Configuration ────────────────────────────────────
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate to Infisical via OIDC to get short-lived tokens and setup CLI
      - name: Setup Infisical
        run: |
          curl -1sLf 'https://artifacts-infisical-core.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical-core

      - name: Infisical OIDC Login
        run: |
          infisical login --method=oidc --oidc-client-id=${{ vars.INFISICAL_MACHINE_IDENTITY_ID }} --domain="https://app.infisical.com"

      # 2. Setup Terraform with TFC OIDC and wait for Terraform Cloud run
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create Terraform Cloud Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        id: tfc-run
        with:
          workspace: ${{ vars.TFC_WORKSPACE }}
          configuration_version: ${{ github.sha }}
          message: "Triggered from GitHub Actions"

      - name: Wait for Terraform Apply to Complete
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.0.0
        with:
          run: ${{ steps.tfc-run.outputs.run_id }}
          comment: "Applied from GitHub Actions deploy workflow"

      # 3. Issue Ephemeral SSH Certificate via Infisical SSH CA
      - name: Generate Ephemeral SSH Certificate
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N ""
          infisical ssh sign --public-key=~/.ssh/id_ed25519.pub --ca-id=${{ vars.INFISICAL_SSH_CA_ID }} > ~/.ssh/id_ed25519-cert.pub

      # 4. Run Ansible with explicit inventory
      - name: Run Ansible Playbooks
        run: |
          infisical run --projectId=${{ vars.INFISICAL_PROJECT_ID }} --env=prod -- ansible-playbook -i ansible/inventory/terraform.yml ansible/playbooks/provision.yml
        env:
          ANSIBLE_SSH_ARGS: "-o StrictHostKeyChecking=accept-new -o CertificateFile=~/.ssh/id_ed25519-cert.pub -i ~/.ssh/id_ed25519"

  # ── Portainer GitOps Webhooks ─────────────────────────────────────────
  # Each stack is linked to this repo in Portainer with "Enable Webhook".
  # Hitting the webhook URL tells Portainer to pull the latest compose
  # files from Git and redeploy — no API key or ENDPOINT_ID required.
  redeploy-stacks:
    runs-on: ubuntu-latest
    needs: provision
    if: ${{ always() && !failure() && !cancelled() }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Portainer Webhooks
        run: ./scripts/portainer-webhook.sh
        env:
          # Comma-separated Portainer GitOps webhook URLs stored in GitHub Secrets.
          # Add one URL per stack: Portainer → Stack → Edit → GitOps → Webhook URL.
          WEBHOOK_URLS: ${{ secrets.PORTAINER_WEBHOOK_URLS }}
