name: Ansible Orchestrator

# Handles pushes that only affect Ansible configuration.  Skips the expensive
# TFC infra-apply stage while still bootstrapping hosts and reconciling
# Portainer.  For full infrastructure changes (Terraform, stacks submodule),
# see infra-orchestrator.yml.

on:
  push:
    branches: [main]
    paths:
      - "ansible/**"
      - ".ansible-lint"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  # Shares the same concurrency group as the infra orchestrator so an
  # Ansible-only run and a full infra run cannot execute simultaneously.
  group: infra-orchestrator-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: false

jobs:
  resolve-context:
    uses: ./.github/workflows/reusable-resolve-plan.yml
    with:
      source_event_name: ${{ github.event_name == 'push' && 'push_ansible_only' || 'dispatch_ansible_only' }}
      push_before: ${{ github.event.before || '' }}
      push_sha: ${{ github.sha }}

  preflight:
    needs: [resolve-context]
    uses: ./.github/workflows/reusable-orch-preflight.yml
    secrets: inherit
    with:
      plan_json: ${{ needs.resolve-context.outputs.plan_json }}

  # The infra stage is included so that inventory-handover and
  # network-preflight-ssh still run (infra-apply itself is skipped because
  # the plan has stage_infra_apply=false in ansible-only mode).
  infra:
    needs: [resolve-context, preflight]
    uses: ./.github/workflows/reusable-orch-infra.yml
    secrets: inherit
    with:
      plan_json: ${{ needs.resolve-context.outputs.plan_json }}
      runner_label: ${{ needs.preflight.outputs.runner_label }}
      network_access_policy_json: ${{ needs.preflight.outputs.network_access_policy_json }}

  ansible:
    needs: [resolve-context, preflight, infra]
    uses: ./.github/workflows/reusable-orch-ansible.yml
    secrets: inherit
    with:
      plan_json: ${{ needs.resolve-context.outputs.plan_json }}
      runner_label: ${{ needs.preflight.outputs.runner_label }}

  portainer:
    needs: [resolve-context, preflight, ansible]
    uses: ./.github/workflows/reusable-orch-portainer.yml
    secrets: inherit
    with:
      plan_json: ${{ needs.resolve-context.outputs.plan_json }}
      runner_label: ${{ needs.preflight.outputs.runner_label }}
      network_access_policy_json: ${{ needs.preflight.outputs.network_access_policy_json }}
