name: Infrastructure Validation

on:
  pull_request:
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".ansible-lint"
  push:
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/ci/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/scripts/**"
      - "stacks"
      - ".ansible-lint"
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: read

concurrency:
  group: infra-validation-${{ github.ref_name || github.event.repository.default_branch || 'main' }}
  cancel-in-progress: true

jobs:
  planner-contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap jq
        uses: ./.github/actions/bootstrap-tools
        with:
          install_jq: "true"
          install_yq: "true"

      - name: Run resolver contract tests
        run: .github/scripts/tests/test_resolve_ci_plan.sh

      - name: Run plan projection tests
        run: .github/scripts/tests/test_project_plan_outputs.sh

      - name: Run webhook gate tests
        run: bash .github/scripts/tests/test_trigger_webhooks_with_gates.sh

      - name: Run network preflight tests
        run: bash .github/scripts/tests/test_preflight_network_access.sh

      - name: Run Portainer apply tests
        run: bash .github/scripts/tests/test_portainer_apply.sh

      - name: Run workflow contract tests
        run: bash .github/scripts/tests/test_workflow_contracts.sh

  bootstrap-tools-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load tool lock
        id: lock
        run: |
          set -euo pipefail
          source .github/ci/tool-versions.lock
          {
            echo "jq_version=${JQ_VERSION}"
            echo "yq_version=${YQ_VERSION}"
            echo "netcat_version=${NETCAT_DEB_VERSION}"
            echo "infisical_version=${INFISICAL_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Bootstrap all pinned tools
        id: bootstrap
        uses: ./.github/actions/bootstrap-tools
        with:
          install_jq: "true"
          install_yq: "true"
          install_netcat: "true"
          install_infisical: "true"

      - name: Assert pinned versions
        run: |
          set -euo pipefail
          [[ "${{ steps.bootstrap.outputs.jq_version_installed }}" == "${{ steps.lock.outputs.jq_version }}" ]]
          [[ "${{ steps.bootstrap.outputs.yq_version_installed }}" == "${{ steps.lock.outputs.yq_version }}" ]]
          [[ "${{ steps.bootstrap.outputs.nc_version_installed }}" == "${{ steps.lock.outputs.netcat_version }}" ]]
          [[ "${{ steps.bootstrap.outputs.infisical_version_installed }}" == "${{ steps.lock.outputs.infisical_version }}" ]]

  terraform-fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        root:
          - terraform/infra
          - terraform/oci
          - terraform/gcp
          - terraform/portainer-root
          - terraform/portainer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (readonly lockfile)
        run: terraform -chdir=${{ matrix.root }} init -backend=false -lockfile=readonly -input=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.root }} validate

  tfc-speculative-plan:
    needs: terraform-validate
    runs-on: ubuntu-latest
    env:
      TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
      TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}
      TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ vars.TFC_ORGANIZATION || vars.TFC_ORG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap jq
        uses: ./.github/actions/bootstrap-tools
        with:
          install_jq: "true"

      - name: Resolve workspace and validate required inputs
        id: preflight
        env:
          WORKSPACE_KEY: infra
          TFC_WORKSPACE_INFRA: ${{ vars.TFC_WORKSPACE_INFRA }}
          TFC_WORKSPACE_PORTAINER: ${{ vars.TFC_WORKSPACE_PORTAINER }}
        run: .github/scripts/stages/tfc_speculative_preflight.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Upload configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.0.0
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          directory: terraform/infra
          speculative: true

      - name: Create speculative run
        id: create-run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        with:
          workspace: ${{ steps.preflight.outputs.workspace_name }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          plan_only: true

      - name: Wait for Terraform Cloud run to complete
        env:
          RUN_ID: ${{ steps.create-run.outputs.run_id }}
          WORKSPACE_NAME: ${{ steps.preflight.outputs.workspace_name }}
          WAIT_TIMEOUT_SECONDS: ${{ vars.TFC_PLAN_WAIT_TIMEOUT_SECONDS || '7200' }}
          POLL_INTERVAL_SECONDS: ${{ vars.TFC_PLAN_POLL_INTERVAL_SECONDS || '10' }}
        run: .github/scripts/tfc/wait_for_tfc_run.sh "${RUN_ID}" "${WORKSPACE_NAME}"

  ansible-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y pipx
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          source .github/ci/tool-versions.lock
          pipx install "ansible-core==${ANSIBLE_CORE_VERSION}"
          pipx install "ansible-lint==${ANSIBLE_LINT_VERSION}"
          ansible-playbook --version | head -n1 | grep -F "core ${ANSIBLE_CORE_VERSION}"
          ansible-lint --version | head -n1 | grep -F "ansible-lint ${ANSIBLE_LINT_VERSION}"
          ansible-galaxy collection install -r ansible/requirements.yml --force-with-deps

      - name: Run ansible-lint
        run: ansible-lint -c .ansible-lint ansible

      - name: Run ansible syntax check
        run: |
          set -euo pipefail
          cat > /tmp/ansible-syntax.ini <<'EOF'
          [oci_nodes]
          localhost ansible_connection=local

          [gcp_witness]
          localhost ansible_connection=local
          EOF
          ansible-playbook -i /tmp/ansible-syntax.ini --syntax-check ansible/playbooks/provision.yml

  stacks-sha-trust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap jq
        uses: ./.github/actions/bootstrap-tools
        with:
          install_jq: "true"

      - name: Resolve current stacks gitlink SHA
        id: stacks-gitlink
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD:stacks)" >> "${GITHUB_OUTPUT}"

      - name: Verify trusted stacks SHA
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STACKS_REPO_READ_TOKEN: ${{ secrets.STACKS_REPO_READ_TOKEN }}
        run: .github/scripts/stacks/verify_trusted_stacks_sha.sh "${{ steps.stacks-gitlink.outputs.sha }}"
