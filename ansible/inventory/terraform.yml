plugin: cloud.terraform.terraform_provider
project_path: ../../terraform/infra
# Local/operator inventory source. CI pipelines render a deterministic
# inventory artifact from Terraform Cloud outputs (inventory-ci.yml).
inventory_hostname:
  - public_ip
groups:
  oci_nodes: "'oci' in provider"
  gcp_witness: "'google' in provider"
compose:
  # OCI nodes use public IPv4
  ansible_host: public_ip | default(witness_ipv6, true)
  ansible_user: "'ubuntu' if 'oci' in provider else 'debian'"
