---
# Portainer Bootstrap Role
# Deploys the management stack (Portainer + Homarr) via Docker Swarm,
# then initializes Portainer's admin user and creates an API key for Terraform.
#
# This role runs ONLY on the first OCI manager node (the Swarm leader).
# Prerequisites: Docker Swarm initialized, GlusterFS mounted, traefik_proxy network exists.

# ──────────────────────────────────────────────
# Deploy the management stack
# ──────────────────────────────────────────────

- name: Check if management stack is already deployed
  ansible.builtin.command: docker stack services management --format "{{ '{{' }}.Name{{ '}}' }}"
  register: management_stack_check
  ignore_errors: true
  changed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# Generate bcrypt hash for the admin password
# ──────────────────────────────────────────────
# Portainer's --admin-password flag accepts a bcrypt hash at startup,
# which is safer than POST-ing the plaintext to /api/users/admin/init
# because the password never travels over HTTP (even on localhost).

- name: Generate bcrypt hash of admin password
  ansible.builtin.set_fact:
    portainer_admin_password_hash: "{{ portainer_admin_password | password_hash('bcrypt', rounds=portainer_bcrypt_rounds) }}"
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

- name: Set candidate API key from environment
  ansible.builtin.set_fact:
    portainer_api_key_candidate: "{{ lookup('env', 'PORTAINER_API_KEY') | default('', true) | trim }}"
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

- name: Ensure management runtime directory exists
  ansible.builtin.file:
    path: "{{ portainer_runtime_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Stage trusted management compose for bootstrap
  ansible.builtin.copy:
    src: "{{ portainer_compose_source_path }}"
    dest: "{{ portainer_compose_path }}"
    owner: root
    group: root
    mode: "0644"
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# Fetch PORTAINER_AUTOMATION_ALLOWED_CIDRS from Infisical so the Traefik
# ipAllowList middleware is correct from the very first stack deploy,
# without waiting for the Phase 7 Infisical agent to render .env.
# ──────────────────────────────────────────────

- name: Fetch PORTAINER_AUTOMATION_ALLOWED_CIDRS from Infisical
  ansible.builtin.command: >
    infisical secrets get PORTAINER_AUTOMATION_ALLOWED_CIDRS
    --env=prod
    --path=/stacks/management
    --projectId={{ infisical_project_id }}
    --plain
    --silent
  delegate_to: localhost
  run_once: true
  become: false
  register: cidr_lookup
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - infisical_project_id | length > 0
  no_log: true

- name: Set PORTAINER_AUTOMATION_ALLOWED_CIDRS (fetched or fallback)
  ansible.builtin.set_fact:
    portainer_automation_cidrs: >-
      {{ (cidr_lookup.stdout | default('') | trim) if (cidr_lookup is defined and cidr_lookup.rc | default(1) == 0 and cidr_lookup.stdout | default('') | trim | length > 0)
         else portainer_automation_cidrs_fallback }}
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Warn when using CIDR fallback
  ansible.builtin.debug:
    msg: |
      [WARNING] PORTAINER_AUTOMATION_ALLOWED_CIDRS could not be fetched from Infisical.
      Using safe fallback: {{ portainer_automation_cidrs_fallback }}
      The Traefik ipAllowList will block all remote API access until the Infisical agent reconciles the real value.
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - cidr_lookup is not defined or cidr_lookup.rc | default(1) != 0 or cidr_lookup.stdout | default('') | trim | length == 0

- name: Deploy management stack (Portainer + Homarr)
  ansible.builtin.command: >
    docker stack deploy
    --compose-file {{ portainer_compose_path }}
    --with-registry-auth
    management
  environment:
    BASE_DOMAIN: "{{ portainer_base_domain }}"
    HOMARR_SECRET_KEY: "{{ lookup('env', 'HOMARR_SECRET_KEY') | default('changeme', true) }}"
    TZ: "{{ lookup('env', 'TZ') | default('Etc/UTC', true) }}"
    PORTAINER_ADMIN_PASSWORD_HASH: "{{ portainer_admin_password_hash }}"
    PORTAINER_AUTOMATION_ALLOWED_CIDRS: "{{ portainer_automation_cidrs | default(portainer_automation_cidrs_fallback) }}"
  register: stack_deploy_result
  changed_when: "'Creating service' in stack_deploy_result.stdout or 'Updating service' in stack_deploy_result.stdout"
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# Wait for Portainer API to become ready
# ──────────────────────────────────────────────

- name: Wait for Portainer API to be reachable
  ansible.builtin.shell: |
    cid=$(docker ps -q --filter "name=management_portainer-server" --filter "status=running" 2>/dev/null | head -1)
    [ -n "$cid" ] || exit 1
    docker exec "$cid" curl -sf http://localhost:9000/api/system/status
  register: portainer_health
  until: portainer_health.rc == 0
  retries: "{{ (portainer_health_timeout / 5) | int }}"
  delay: 5
  changed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# Admin user initialization
# ──────────────────────────────────────────────
# The admin password is set via the --admin-password CLI flag (bcrypt
# hash) in the docker-compose.yml, so no API call is needed.
# Portainer applies the hash on every container start, making this
# idempotent and avoiding plaintext transmission over HTTP.

# ──────────────────────────────────────────────
# Authenticate and create an API key for Terraform
# ──────────────────────────────────────────────

- name: Authenticate to Portainer API
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/auth"
    method: POST
    body_format: json
    body:
      Username: "{{ portainer_admin_user }}"
      Password: "{{ portainer_admin_password }}"
    status_code: 200
    validate_certs: false
  register: portainer_auth
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

- name: Set JWT token fact
  ansible.builtin.set_fact:
    portainer_jwt: "{{ portainer_auth.json.jwt }}"
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

- name: Check for existing Terraform API key
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/users/1/tokens"
    method: GET
    headers:
      Authorization: "Bearer {{ portainer_jwt }}"
    status_code: 200
    validate_certs: false
  register: existing_tokens
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Determine Terraform-managed token IDs
  ansible.builtin.set_fact:
    terraform_managed_token_ids: "{{ existing_tokens.json | selectattr('description', 'equalto', portainer_api_token_description) | map(attribute='id') | list }}"
  when: inventory_hostname == groups['oci_nodes'][0]

# If an API key was not passed in the environment (e.g. infisical run did not
# inject it), attempt a direct Infisical fetch so the reuse path is reachable.
- name: Fetch PORTAINER_API_KEY from Infisical when not in environment
  ansible.builtin.command: >
    infisical secrets get PORTAINER_API_KEY
    --env=prod
    --path=/management
    --projectId={{ infisical_project_id }}
    --plain
    --silent
  delegate_to: localhost
  run_once: true
  become: false
  register: api_key_infisical_lookup
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - portainer_api_key_candidate | length == 0
    - infisical_project_id | length > 0
  no_log: true

- name: Use Infisical-fetched API key as candidate
  ansible.builtin.set_fact:
    portainer_api_key_candidate: "{{ api_key_infisical_lookup.stdout | trim }}"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - portainer_api_key_candidate | length == 0
    - api_key_infisical_lookup is defined
    - api_key_infisical_lookup.rc | default(1) == 0
    - api_key_infisical_lookup.stdout | default('') | trim | length > 0
  no_log: true

- name: Validate existing PORTAINER_API_KEY from environment
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/system/status"
    method: GET
    headers:
      X-API-Key: "{{ portainer_api_key_candidate }}"
    status_code: [200, 401, 403]
    validate_certs: false
  register: portainer_key_validation
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - portainer_api_key_candidate | length > 0
  no_log: true

- name: Determine API key repair mode
  ansible.builtin.set_fact:
    reuse_existing_api_key: "{{ (portainer_api_key_candidate | length > 0) and (portainer_key_validation is defined) and (portainer_key_validation.status == 200) }}"
    rotate_api_key: "{{ not ((portainer_api_key_candidate | length > 0) and (portainer_key_validation is defined) and (portainer_key_validation.status == 200)) }}"
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Reuse existing valid API key
  ansible.builtin.set_fact:
    portainer_api_key: "{{ portainer_api_key_candidate }}"
    portainer_api_key_source: "reused-existing-key"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - reuse_existing_api_key | default(false)
  no_log: true

- name: Warn about API key rotation
  ansible.builtin.debug:
    msg: |
      [WARNING] Rotating Portainer API key (rotate_api_key={{ rotate_api_key }}).
      {{ (terraform_managed_token_ids | default([]) | length) | string }} existing terraform-managed token(s) will be deleted.
      Any concurrent or manual automation using the previous key will be invalidated.
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(false)
    - (terraform_managed_token_ids | default([]) | length) > 0

- name: Delete existing Terraform-managed API keys before rotation
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/users/1/tokens/{{ item }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ portainer_jwt }}"
    status_code: [200, 204]
    validate_certs: false
  loop: "{{ terraform_managed_token_ids | default([]) }}"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(false)
    - (terraform_managed_token_ids | default([]) | length) > 0
  no_log: true

- name: Create Portainer API key for Terraform
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/users/1/tokens"
    method: POST
    headers:
      Authorization: "Bearer {{ portainer_jwt }}"
    body_format: json
    body:
      description: "{{ portainer_api_token_description }}"
    status_code: 200
    validate_certs: false
  register: api_key_result
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(true)
  no_log: true

- name: Ensure API key rotation produced a raw key
  ansible.builtin.assert:
    that:
      - api_key_result is defined
      - api_key_result.json is defined
      - api_key_result.json.rawAPIKey is defined
      - api_key_result.json.rawAPIKey | length > 0
    fail_msg: "API key rotation was required, but Portainer did not return a raw API key."
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(true)
  no_log: true

- name: Set rotated API key fact
  ansible.builtin.set_fact:
    portainer_api_key: "{{ api_key_result.json.rawAPIKey }}"
    portainer_api_key_source: "rotated-new-key"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(true)
  no_log: true

# Persist bootstrap-managed secrets from the controller, which already has
# the workflow's OIDC-authenticated Infisical CLI session.
- name: Write PORTAINER_ADMIN_PASSWORD_HASH to Infisical
  ansible.builtin.command: >
    infisical secrets set PORTAINER_ADMIN_PASSWORD_HASH={{ portainer_admin_password_hash }}
    --env=prod
    --path=/stacks/management
    --projectId={{ infisical_project_id }}
  delegate_to: localhost
  run_once: true
  become: false
  register: infisical_hash_result
  changed_when: infisical_hash_result.rc == 0
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - infisical_project_id | length > 0
  no_log: true

- name: Set API key source fallback
  ansible.builtin.set_fact:
    portainer_api_key_source: "{{ portainer_api_key_source | default('unknown') }}"
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# Write credentials to Infisical /management
# ──────────────────────────────────────────────

- name: Write PORTAINER_URL to Infisical
  ansible.builtin.command: >
    infisical secrets set PORTAINER_URL=https://portainer.{{ portainer_base_domain }}
    --env=prod
    --path=/management
    --projectId={{ infisical_project_id }}
  delegate_to: localhost
  run_once: true
  become: false
  register: infisical_url_result
  changed_when: infisical_url_result.rc == 0
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - infisical_project_id | length > 0
    - portainer_base_domain != 'localhost'

- name: Write PORTAINER_API_URL to Infisical
  ansible.builtin.command: >
    infisical secrets set PORTAINER_API_URL=https://portainer-api.{{ portainer_base_domain }}
    --env=prod
    --path=/management
    --projectId={{ infisical_project_id }}
  delegate_to: localhost
  run_once: true
  become: false
  register: infisical_api_url_result
  changed_when: infisical_api_url_result.rc == 0
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - infisical_project_id | length > 0
    - portainer_base_domain != 'localhost'

- name: Write PORTAINER_API_KEY to Infisical
  ansible.builtin.command: >
    infisical secrets set PORTAINER_API_KEY={{ portainer_api_key }}
    --env=prod
    --path=/management
    --projectId={{ infisical_project_id }}
  delegate_to: localhost
  run_once: true
  become: false
  register: infisical_key_result
  changed_when: infisical_key_result.rc == 0
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - infisical_project_id | length > 0
    - portainer_api_key is defined
  no_log: true

# ──────────────────────────────────────────────
# Verify
# ──────────────────────────────────────────────

- name: Verify Portainer is healthy and API key works
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/system/status"
    method: GET
    headers:
      X-API-Key: "{{ portainer_api_key | default(omit) }}"
    status_code: 200
    validate_certs: false
  register: final_health_check
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - portainer_api_key is defined

- name: Display Portainer bootstrap summary
  ansible.builtin.debug:
    msg: |
      Portainer bootstrap complete:
        UI URL:      https://portainer.{{ portainer_base_domain }}
        API URL:     https://portainer-api.{{ portainer_base_domain }}
        API Key:     {{ 'written to Infisical /management' if (infisical_project_id | length > 0) else 'MANUAL — set PORTAINER_API_KEY in Infisical /management' }}
        Key Mode:    {{ portainer_api_key_source }}
        Admin Hash:  {{ 'written to Infisical /stacks/management' if (infisical_project_id | length > 0) else 'MANUAL — set PORTAINER_ADMIN_PASSWORD_HASH in Infisical /stacks/management' }}
        Stack:       management (portainer-server + portainer-agent + homarr)
        Health:      {{ 'OK' if (final_health_check is defined and final_health_check.status == 200) else 'SKIPPED' }}
  when: inventory_hostname == groups['oci_nodes'][0]
