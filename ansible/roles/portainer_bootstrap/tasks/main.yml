---
# Portainer Bootstrap Role
# Deploys the management stack (Portainer + Homarr) via Docker Swarm,
# then initializes Portainer's admin user and creates an API key for Terraform.
#
# This role runs ONLY on the first OCI manager node (the Swarm leader).
# Prerequisites: Docker Swarm initialized, GlusterFS mounted, traefik_proxy network exists.

# ──────────────────────────────────────────────
# Deploy the management stack
# ──────────────────────────────────────────────

- name: Check if management stack is already deployed
  ansible.builtin.command: docker stack services management --format "{{ '{{' }}.Name{{ '}}' }}"
  register: management_stack_check
  ignore_errors: true
  changed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# Generate bcrypt hash for the admin password
# ──────────────────────────────────────────────
# Portainer's --admin-password flag accepts a bcrypt hash at startup,
# which is safer than POST-ing the plaintext to /api/users/admin/init
# because the password never travels over HTTP (even on localhost).

- name: Generate bcrypt hash of admin password
  ansible.builtin.set_fact:
    portainer_admin_password_hash: "{{ portainer_admin_password | password_hash('bcrypt', rounds=portainer_bcrypt_rounds) }}"
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

- name: Set candidate API key from environment
  ansible.builtin.set_fact:
    portainer_api_key_candidate: "{{ lookup('env', 'PORTAINER_API_KEY') | default('', true) | trim }}"
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

- name: Ensure management runtime directory exists
  ansible.builtin.file:
    path: "{{ portainer_runtime_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Stage trusted management compose for bootstrap
  ansible.builtin.copy:
    src: "{{ portainer_compose_source_path }}"
    dest: "{{ portainer_compose_path }}"
    owner: root
    group: root
    mode: "0644"
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# PORTAINER_AUTOMATION_ALLOWED_CIDRS fetch + pass removed: the portainer-api
# Traefik router (and its ipAllowList middleware) no longer exists. CI
# automation accesses Portainer directly via the Tailscale IP — no public
# route or IP allowlist is needed.
# ──────────────────────────────────────────────
# Pre-deploy cleanup: remove stale stack + volume when Portainer is unhealthy
# ──────────────────────────────────────────────
# If a prior CI run left the management stack deployed but Portainer crashed
# (e.g. corrupt DB from a partially-migrated environment 1 record), the local
# portainer_db volume persists across redeploys and causes the same crash loop.
# Detect this and clean up before deploying so Portainer gets a fresh DB.

- name: Check if Portainer API is currently healthy (pre-deploy)
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/system/status"
    method: GET
    status_code: [200]
    validate_certs: false
  register: portainer_pre_health
  failed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Remove unhealthy management stack before clean redeploy
  ansible.builtin.command: docker stack rm management
  register: stack_rm_result
  changed_when: stack_rm_result.rc == 0
  failed_when: false
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - management_stack_check.rc | default(1) == 0
    - portainer_pre_health.status | default(0) != 200

- name: Wait for management stack services to fully stop
  ansible.builtin.command: >
    docker service ls --filter label=com.docker.stack.namespace=management -q
  register: management_services_remaining
  until: management_services_remaining.stdout | trim == ''
  retries: 24
  delay: 5
  changed_when: false
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - stack_rm_result is not skipped
    - stack_rm_result.rc | default(1) == 0

- name: Remove stale Portainer data volume for clean redeploy
  ansible.builtin.command: docker volume rm management_portainer_db
  failed_when: false
  changed_when: true
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - portainer_pre_health.status | default(0) != 200

- name: Ensure shared Traefik overlay network exists
  community.docker.docker_network:
    name: traefik_proxy
    driver: overlay
    attachable: yes
    state: present
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Deploy management stack (Portainer + Homarr)
  ansible.builtin.command: >
    docker stack deploy
    --compose-file {{ portainer_compose_path }}
    --with-registry-auth
    management
  environment:
    BASE_DOMAIN: "{{ portainer_base_domain }}"
    HOMARR_SECRET_KEY: "{{ lookup('env', 'HOMARR_SECRET_KEY') | default('changeme', true) }}"
    TZ: "{{ lookup('env', 'TZ') | default('Etc/UTC', true) }}"
    PORTAINER_ADMIN_PASSWORD_HASH: "{{ portainer_admin_password_hash }}"
  register: stack_deploy_result
  changed_when: "'Creating service' in stack_deploy_result.stdout or 'Updating service' in stack_deploy_result.stdout"
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# Wait for Portainer API to become ready
# ──────────────────────────────────────────────
# On first deploy the -H flag causes FTL because portainer-agent isn't
# reachable yet on the overlay network. Swarm's restart policy recovers
# this automatically. The endpoint is never created by -H (init is
# skipped once the admin user exists), so we create it via API after
# authentication using an atomic re-auth shell task that tolerates
# any intermediate server restarts.

- name: Wait for portainer-agent to have a Running task
  ansible.builtin.shell:
    cmd: >
      docker service ps management_portainer-agent
      --filter desired-state=Running
      --format '{{ '{{' }}.CurrentState{{ '}}' }}'
      | grep -q '^Running'
    executable: /bin/bash
  register: agent_running
  until: agent_running.rc == 0
  retries: 24
  delay: 5
  changed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Debug - show management service task states
  ansible.builtin.command: >
    docker service ps management_portainer-server
    --no-trunc
    --format "node={{ '{{' }}.Node{{ '}}' }} state={{ '{{' }}.CurrentState{{ '}}' }} error={{ '{{' }}.Error{{ '}}' }}"
  register: portainer_svc_ps
  changed_when: false
  failed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Debug - show portainer service task states
  ansible.builtin.debug:
    msg: "{{ portainer_svc_ps.stdout_lines }}"
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Debug - show portainer service logs (last 60 lines)
  ansible.builtin.command: docker service logs management_portainer-server --tail 60 --no-task-ids
  register: portainer_svc_logs
  changed_when: false
  failed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Debug - print portainer service logs
  ansible.builtin.debug:
    msg: "{{ (portainer_svc_logs.stdout_lines + portainer_svc_logs.stderr_lines) }}"
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Debug - check port 9000 connectivity from host
  ansible.builtin.shell: |
    echo "--- curl http://localhost:9000/api/system/status ---"
    curl -sv --max-time 5 http://localhost:9000/api/system/status 2>&1 || true
    echo "--- ss -tlnp | grep 9000 ---"
    ss -tlnp | grep 9000 || echo "port 9000 not bound"
  register: port_debug
  changed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Debug - print port 9000 connectivity
  ansible.builtin.debug:
    msg: "{{ port_debug.stdout_lines }}"
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Wait for Portainer API to be reachable
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/system/status"
    method: GET
    status_code: 200
    validate_certs: false
  register: portainer_status
  until: portainer_status.status == 200
  retries: "{{ (portainer_health_timeout / 5) | int }}"
  delay: 5
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# Admin user initialization
# ──────────────────────────────────────────────
# The admin password is set via the --admin-password CLI flag (bcrypt
# hash) in the docker-compose.yml, so no API call is needed.
# Portainer applies the hash on every container start, making this
# idempotent and avoiding plaintext transmission over HTTP.

# ──────────────────────────────────────────────
# Authenticate and create an API key for Terraform
# ──────────────────────────────────────────────

- name: Authenticate to Portainer API
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/auth"
    method: POST
    body_format: json
    body:
      Username: "{{ portainer_admin_user }}"
      Password: "{{ portainer_admin_password }}"
    status_code: 200
    validate_certs: false
  register: portainer_auth
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

- name: Set JWT token fact
  ansible.builtin.set_fact:
    portainer_jwt: "{{ portainer_auth.json.jwt }}"
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

# ──────────────────────────────────────────────
# Configure agent endpoint (decoupled from startup)
# ──────────────────────────────────────────────
# The -H flag creates the endpoint only during first-boot init, which
# fails (FTL) before the agent is reachable. On subsequent boots init
# is skipped, so the endpoint is never persisted. We create it via API
# with a fresh JWT on each retry to tolerate any intermediate restarts.

- name: Debug - diagnose endpoint creation (single attempt, visible output)
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail

      echo "=== Step 1: Authenticate ==="
      JWT=$(python3 -c "
      import json, os, urllib.request
      api, u, p = os.environ['P_API'], os.environ['P_USER'], os.environ['P_PASS']
      r = urllib.request.urlopen(urllib.request.Request(
          f'{api}/auth', data=json.dumps({'Username': u, 'Password': p}).encode(),
          headers={'Content-Type': 'application/json'}, method='POST'))
      print(json.loads(r.read())['jwt'])
      " 2>&1) || { echo "Auth FAILED: $JWT"; exit 1; }
      echo "Auth OK (JWT length=$(printf '%s' "$JWT" | wc -c))"

      echo ""
      echo "=== Step 2: List endpoints ==="
      EP_JSON=$(curl -sf "$P_API/endpoints" -H "Authorization: Bearer $JWT") \
        || { echo "List FAILED (curl rc=$?)"; exit 1; }
      echo "$EP_JSON" | python3 -c "
      import sys, json
      eps = json.load(sys.stdin)
      print(f'Endpoints count={len(eps)}')
      for e in eps:
          print(f'  id={e.get(\"Id\")} name={e.get(\"Name\")} type={e.get(\"Type\")} url={e.get(\"URL\")}')
      "
      EP_COUNT=$(echo "$EP_JSON" | python3 -c 'import sys,json;print(len(json.load(sys.stdin)))')
      if [ "$EP_COUNT" -gt 0 ]; then
        echo "Endpoint already exists — nothing to create"
        exit 0
      fi

      echo ""
      echo "=== Step 3: Create endpoint (multipart form) ==="
      curl -sv -X POST "$P_API/endpoints" \
        -H "Authorization: Bearer $JWT" \
        -F "Name=primary" \
        -F "EndpointCreationType=2" \
        -F "URL=tcp://tasks.portainer-agent:9001" \
        -F "TLS=true" \
        -F "TLSSkipVerify=true" \
        -F "TLSSkipClientVerify=true" 2>&1 || true
    executable: /bin/bash
  environment:
    P_API: "{{ portainer_api_url }}"
    P_USER: "{{ portainer_admin_user }}"
    P_PASS: "{{ portainer_admin_password }}"
  register: endpoint_debug
  failed_when: false
  changed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

- name: Debug - print endpoint creation diagnostics
  ansible.builtin.debug:
    msg: "{{ endpoint_debug.stdout_lines | default([]) + endpoint_debug.stderr_lines | default([]) }}"
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Ensure agent endpoint exists in Portainer
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail

      # Authenticate (fresh JWT each retry — survives server restarts)
      JWT=$(python3 -c "
      import json, os, urllib.request
      api, u, p = os.environ['P_API'], os.environ['P_USER'], os.environ['P_PASS']
      r = urllib.request.urlopen(urllib.request.Request(
          f'{api}/auth', data=json.dumps({'Username': u, 'Password': p}).encode(),
          headers={'Content-Type': 'application/json'}, method='POST'))
      print(json.loads(r.read())['jwt'])
      ")

      # Skip creation when an endpoint already exists
      EP_COUNT=$(curl -sf "$P_API/endpoints" \
        -H "Authorization: Bearer $JWT" \
        | python3 -c 'import sys,json;print(len(json.load(sys.stdin)))')

      if [ "$EP_COUNT" -gt 0 ]; then
        echo 'UNCHANGED'
        exit 0
      fi

      # Create agent endpoint (multipart form — required by Portainer API)
      curl -sf -X POST "$P_API/endpoints" \
        -H "Authorization: Bearer $JWT" \
        -F "Name=primary" \
        -F "EndpointCreationType=2" \
        -F "URL=tcp://tasks.portainer-agent:9001" \
        -F "TLS=true" \
        -F "TLSSkipVerify=true" \
        -F "TLSSkipClientVerify=true" > /dev/null

      echo 'CHANGED'
    executable: /bin/bash
  environment:
    P_API: "{{ portainer_api_url }}"
    P_USER: "{{ portainer_admin_user }}"
    P_PASS: "{{ portainer_admin_password }}"
  register: endpoint_ensure
  until: endpoint_ensure.rc == 0
  retries: 12
  delay: 5
  changed_when: "'CHANGED' in endpoint_ensure.stdout"
  when: inventory_hostname == groups['oci_nodes'][0]
  no_log: true

- name: Check for existing Terraform API key
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/users/1/tokens"
    method: GET
    headers:
      Authorization: "Bearer {{ portainer_jwt }}"
    status_code: 200
    validate_certs: false
  register: existing_tokens
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Determine Terraform-managed token IDs
  ansible.builtin.set_fact:
    terraform_managed_token_ids: "{{ existing_tokens.json | selectattr('description', 'equalto', portainer_api_token_description) | map(attribute='id') | list }}"
  when: inventory_hostname == groups['oci_nodes'][0]

# If an API key was not passed in the environment (e.g. infisical run did not
# inject it), attempt a direct Infisical fetch so the reuse path is reachable.
- name: Fetch PORTAINER_API_KEY from Infisical when not in environment
  ansible.builtin.command: >
    infisical secrets get PORTAINER_API_KEY
    --env=prod
    --path=/management
    --projectId={{ infisical_project_id }}
    --plain
    --silent
  delegate_to: localhost
  run_once: true
  become: false
  register: api_key_infisical_lookup
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - portainer_api_key_candidate | length == 0
    - infisical_project_id | length > 0
  no_log: true

- name: Use Infisical-fetched API key as candidate
  ansible.builtin.set_fact:
    portainer_api_key_candidate: "{{ api_key_infisical_lookup.stdout | trim }}"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - portainer_api_key_candidate | length == 0
    - api_key_infisical_lookup is defined
    - api_key_infisical_lookup.rc | default(1) == 0
    - api_key_infisical_lookup.stdout | default('') | trim | length > 0
  no_log: true

- name: Validate existing PORTAINER_API_KEY from environment
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/system/status"
    method: GET
    headers:
      X-API-Key: "{{ portainer_api_key_candidate }}"
    status_code: [200, 401, 403]
    validate_certs: false
  register: portainer_key_validation
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - portainer_api_key_candidate | length > 0
  no_log: true

- name: Determine API key repair mode
  ansible.builtin.set_fact:
    reuse_existing_api_key: "{{ (portainer_api_key_candidate | length > 0) and (portainer_key_validation is defined) and (portainer_key_validation.status == 200) }}"
    rotate_api_key: "{{ not ((portainer_api_key_candidate | length > 0) and (portainer_key_validation is defined) and (portainer_key_validation.status == 200)) }}"
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Reuse existing valid API key
  ansible.builtin.set_fact:
    portainer_api_key: "{{ portainer_api_key_candidate }}"
    portainer_api_key_source: "reused-existing-key"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - reuse_existing_api_key | default(false)
  no_log: true

- name: Warn about API key rotation
  ansible.builtin.debug:
    msg: |
      [WARNING] Rotating Portainer API key (rotate_api_key={{ rotate_api_key }}).
      {{ (terraform_managed_token_ids | default([]) | length) | string }} existing terraform-managed token(s) will be deleted.
      Any concurrent or manual automation using the previous key will be invalidated.
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(false)
    - (terraform_managed_token_ids | default([]) | length) > 0

- name: Delete existing Terraform-managed API keys before rotation
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/users/1/tokens/{{ item }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ portainer_jwt }}"
    status_code: [200, 204]
    validate_certs: false
  loop: "{{ terraform_managed_token_ids | default([]) }}"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(false)
    - (terraform_managed_token_ids | default([]) | length) > 0
  no_log: true

- name: Create Portainer API key for Terraform
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/users/1/tokens"
    method: POST
    headers:
      Authorization: "Bearer {{ portainer_jwt }}"
    body_format: json
    body:
      description: "{{ portainer_api_token_description }}"
    status_code: 200
    validate_certs: false
  register: api_key_result
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(true)
  no_log: true

- name: Ensure API key rotation produced a raw key
  ansible.builtin.assert:
    that:
      - api_key_result is defined
      - api_key_result.json is defined
      - api_key_result.json.rawAPIKey is defined
      - api_key_result.json.rawAPIKey | length > 0
    fail_msg: "API key rotation was required, but Portainer did not return a raw API key."
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(true)
  no_log: true

- name: Set rotated API key fact
  ansible.builtin.set_fact:
    portainer_api_key: "{{ api_key_result.json.rawAPIKey }}"
    portainer_api_key_source: "rotated-new-key"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - rotate_api_key | default(true)
  no_log: true

# Persist bootstrap-managed secrets from the controller, which already has
# the workflow's OIDC-authenticated Infisical CLI session.
- name: Write PORTAINER_ADMIN_PASSWORD_HASH to Infisical
  ansible.builtin.command: >
    infisical secrets set PORTAINER_ADMIN_PASSWORD_HASH={{ portainer_admin_password_hash }}
    --env=prod
    --path=/stacks/management
    --projectId={{ infisical_project_id }}
  delegate_to: localhost
  run_once: true
  become: false
  register: infisical_hash_result
  changed_when: infisical_hash_result.rc == 0
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - infisical_project_id | length > 0
  no_log: true

- name: Set API key source fallback
  ansible.builtin.set_fact:
    portainer_api_key_source: "{{ portainer_api_key_source | default('unknown') }}"
  when: inventory_hostname == groups['oci_nodes'][0]

# ──────────────────────────────────────────────
# Write credentials to Infisical /management
# ──────────────────────────────────────────────

- name: Write PORTAINER_URL to Infisical
  ansible.builtin.command: >
    infisical secrets set PORTAINER_URL=https://portainer.{{ portainer_base_domain }}
    --env=prod
    --path=/management
    --projectId={{ infisical_project_id }}
  delegate_to: localhost
  run_once: true
  become: false
  register: infisical_url_result
  changed_when: infisical_url_result.rc == 0
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - infisical_project_id | length > 0
    - portainer_base_domain != 'localhost'

- name: Write PORTAINER_API_URL to Infisical
  ansible.builtin.command: >
    infisical secrets set PORTAINER_API_URL=http://{{ ts_ip }}:9000/api
    --env=prod
    --path=/management
    --projectId={{ infisical_project_id }}
  delegate_to: localhost
  run_once: true
  become: false
  register: infisical_api_url_result
  changed_when: infisical_api_url_result.rc == 0
  # Use Tailscale IP — WireGuard provides transport encryption; no public route needed.
  # ts_ip is set as a fact by the swarm role (Phase 5) on this same host.
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - infisical_project_id | length > 0
    - ts_ip is defined

- name: Write PORTAINER_API_KEY to Infisical
  ansible.builtin.command: >
    infisical secrets set PORTAINER_API_KEY={{ portainer_api_key }}
    --env=prod
    --path=/management
    --projectId={{ infisical_project_id }}
  delegate_to: localhost
  run_once: true
  become: false
  register: infisical_key_result
  changed_when: infisical_key_result.rc == 0
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - infisical_project_id | length > 0
    - portainer_api_key is defined
  no_log: true

# ──────────────────────────────────────────────
# Verify
# ──────────────────────────────────────────────

- name: Verify Portainer is healthy and API key works
  ansible.builtin.uri:
    url: "{{ portainer_api_url }}/system/status"
    method: GET
    headers:
      X-API-Key: "{{ portainer_api_key | default(omit) }}"
    status_code: 200
    validate_certs: false
  register: final_health_check
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - portainer_api_key is defined

- name: Display Portainer bootstrap summary
  ansible.builtin.debug:
    msg: |
      Portainer bootstrap complete:
        UI URL:      https://portainer.{{ portainer_base_domain }}
        API URL:     http://{{ ts_ip | default('(ts_ip unavailable)') }}:9000/api (Tailscale)
        API Key:     {{ 'written to Infisical /management' if (infisical_project_id | length > 0) else 'MANUAL — set PORTAINER_API_KEY in Infisical /management' }}
        Key Mode:    {{ portainer_api_key_source }}
        Admin Hash:  {{ 'written to Infisical /stacks/management' if (infisical_project_id | length > 0) else 'MANUAL — set PORTAINER_ADMIN_PASSWORD_HASH in Infisical /stacks/management' }}
        Stack:       management (portainer-server + portainer-agent + homarr)
        Health:      {{ 'OK' if (final_health_check is defined and final_health_check.status == 200) else 'SKIPPED' }}
  when: inventory_hostname == groups['oci_nodes'][0]
