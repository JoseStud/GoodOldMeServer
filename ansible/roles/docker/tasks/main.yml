---
- name: Check if Docker is already installed
  ansible.builtin.stat:
    path: /usr/bin/docker
  register: docker_check

- name: Install Docker Engine via official APT repository
  when: not docker_check.stat.exists
  block:
    - name: Install prerequisites for Docker APT repo
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
          {{ ansible_facts['distribution_release'] }} stable
        state: present
        filename: docker

    - name: Install Docker CE packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

- name: Ensure Docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add provisioned user to docker group
  ansible.builtin.user:
    name: "{{ service_user }}"
    groups: docker
    append: true

- name: Check for systemd-resolved configuration on OCI workers
  ansible.builtin.stat:
    path: /etc/systemd/resolved.conf
  register: systemd_resolved_conf
  when:
    - "'oci_nodes' in group_names"
    - ansible_service_mgr == 'systemd'
    - ansible_distribution == 'Ubuntu'

- name: Check for systemd-resolved upstream resolv.conf on OCI workers
  ansible.builtin.stat:
    path: /run/systemd/resolve/resolv.conf
  register: systemd_resolved_runtime_resolv
  when:
    - "'oci_nodes' in group_names"
    - ansible_service_mgr == 'systemd'
    - ansible_distribution == 'Ubuntu'

- name: Disable systemd-resolved DNS stub listener for Pi-hole host port 53
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'
    insertafter: '^\[Resolve\]'
    backup: true
  register: dns_stub_listener
  when:
    - "'oci_nodes' in group_names"
    - ansible_service_mgr == 'systemd'
    - ansible_distribution == 'Ubuntu'
    - systemd_resolved_conf.stat.exists | default(false)

- name: Point /etc/resolv.conf at systemd-resolved upstream resolvers
  ansible.builtin.file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  register: systemd_resolved_resolv_link
  when:
    - "'oci_nodes' in group_names"
    - ansible_service_mgr == 'systemd'
    - ansible_distribution == 'Ubuntu'
    - systemd_resolved_runtime_resolv.stat.exists | default(false)

- name: Restart systemd-resolved after freeing host port 53
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  when:
    - "'oci_nodes' in group_names"
    - ansible_service_mgr == 'systemd'
    - ansible_distribution == 'Ubuntu'
    - (dns_stub_listener is defined and dns_stub_listener.changed) or
      (systemd_resolved_resolv_link is defined and systemd_resolved_resolv_link.changed)
