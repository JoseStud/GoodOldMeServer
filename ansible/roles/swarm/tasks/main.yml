---
# Swarm bootstrap role — initializes a 3-manager Swarm over Tailscale mesh
# Expects: Docker installed, Tailscale authenticated on all nodes

- name: Gather Tailscale IPv4 address
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ipv4
  changed_when: false

- name: Set Tailscale IP fact
  ansible.builtin.set_fact:
    ts_ip: "{{ tailscale_ipv4.stdout | trim }}"

- name: Check if node is already in a Swarm
  ansible.builtin.command: docker info --format '{{ '{{' }} .Swarm.LocalNodeState {{ '}}' }}'
  register: swarm_state
  changed_when: false

# --- Initialize Swarm on first OCI node ---

- name: Initialize Docker Swarm on first manager
  ansible.builtin.command: >
    docker swarm init
    --advertise-addr {{ ts_ip }}
    --listen-addr {{ ts_ip }}:2377
  register: swarm_init
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - swarm_state.stdout != 'active'

- name: Get manager join token
  ansible.builtin.command: docker swarm join-token -q manager
  register: manager_token_result
  changed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Set manager token fact on first node
  ansible.builtin.set_fact:
    swarm_manager_token: "{{ manager_token_result.stdout | trim }}"
    swarm_first_manager_ip: "{{ ts_ip }}"
  when: inventory_hostname == groups['oci_nodes'][0]

# --- Join remaining nodes as managers ---

- name: Join second OCI node as manager
  ansible.builtin.command: >
    docker swarm join
    --token {{ hostvars[groups['oci_nodes'][0]].swarm_manager_token }}
    --advertise-addr {{ ts_ip }}
    {{ hostvars[groups['oci_nodes'][0]].swarm_first_manager_ip }}:2377
  when:
    - inventory_hostname == groups['oci_nodes'][1]
    - swarm_state.stdout != 'active'
    - hostvars[groups['oci_nodes'][0]].swarm_manager_token is defined

- name: Join GCP witness as manager
  ansible.builtin.command: >
    docker swarm join
    --token {{ hostvars[groups['oci_nodes'][0]].swarm_manager_token }}
    --advertise-addr {{ ts_ip }}
    {{ hostvars[groups['oci_nodes'][0]].swarm_first_manager_ip }}:2377
  when:
    - inventory_hostname in groups['gcp_witness']
    - swarm_state.stdout != 'active'
    - hostvars[groups['oci_nodes'][0]].swarm_manager_token is defined

# --- Assign node labels (run from first manager) ---

- name: Get Swarm node list (ID and Hostname)
  ansible.builtin.command: docker node ls --format '{{ '{{' }}.ID{{ '}}' }},{{ '{{' }}.Hostname{{ '}}' }}'
  register: swarm_nodes
  changed_when: false
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Build hostname-to-nodeID mapping
  ansible.builtin.set_fact:
    swarm_node_map: >-
      {{ swarm_node_map | default({}) | combine({item.split(',')[1]: item.split(',')[0]}) }}
  loop: "{{ swarm_nodes.stdout_lines | default([]) }}"
  when: inventory_hostname == groups['oci_nodes'][0]

- name: Gather all node hostnames
  ansible.builtin.command: hostname
  register: node_hostname
  changed_when: false

- name: Set node hostname fact
  ansible.builtin.set_fact:
    swarm_node_hostname: "{{ node_hostname.stdout | trim }}"

- name: Label OCI nodes with location=cloud
  ansible.builtin.command: >
    docker node update --label-add location=cloud {{ swarm_node_map[hostvars[item]['swarm_node_hostname']] }}
  loop: "{{ groups['oci_nodes'] }}"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - swarm_node_map is defined
    - "'swarm_node_hostname' in hostvars[item]"
    - hostvars[item]['swarm_node_hostname'] in swarm_node_map
  changed_when: false

- name: Label GCP witness with role=witness
  ansible.builtin.command: >
    docker node update --label-add role=witness {{ swarm_node_map[hostvars[item]['swarm_node_hostname']] }}
  loop: "{{ groups['gcp_witness'] }}"
  when:
    - inventory_hostname == groups['oci_nodes'][0]
    - swarm_node_map is defined
    - "'swarm_node_hostname' in hostvars[item]"
    - hostvars[item]['swarm_node_hostname'] in swarm_node_map
  changed_when: false

# --- Create overlay network (requires active Swarm) ---

- name: Create Global Swarm Mesh Network
  community.docker.docker_network:
    name: traefik_proxy
    driver: overlay
    attachable: yes
    state: present
  when: inventory_hostname == groups['oci_nodes'][0]
