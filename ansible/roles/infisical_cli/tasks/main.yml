---
- name: Check if Infisical CLI is installed
  ansible.builtin.stat:
    path: /usr/local/bin/infisical
  register: infisical_binary

# CLI lives in Infisical/cli (separate repo from the main Infisical/infisical).
- name: Get latest Infisical CLI release version
  ansible.builtin.uri:
    url: https://api.github.com/repos/Infisical/cli/releases/latest
    return_content: true
    body_format: json
  register: infisical_release
  when: not infisical_binary.stat.exists

- name: Download and install Infisical CLI
  vars:
    infisical_version: "{{ infisical_release.json.tag_name | regex_replace('^v', '') }}"
    infisical_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"
  when: not infisical_binary.stat.exists
  block:
    - name: Download Infisical CLI deb package
      ansible.builtin.get_url:
        url: "https://github.com/Infisical/cli/releases/download/v{{ infisical_version }}/infisical_{{ infisical_version }}_linux_{{ infisical_arch }}.deb"
        dest: "/tmp/infisical_{{ infisical_version }}_linux_{{ infisical_arch }}.deb"
        mode: "0644"

    - name: Install Infisical CLI deb package
      ansible.builtin.apt:
        deb: "/tmp/infisical_{{ infisical_version }}_linux_{{ infisical_arch }}.deb"
