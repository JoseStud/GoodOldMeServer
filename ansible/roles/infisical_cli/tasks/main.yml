---
- name: Add Infisical apt repository via setup script
  ansible.builtin.shell:
    cmd: "curl -fsSL 'https://dl.cloudsmith.io/public/infisical/infisical-core/setup.deb.sh' | bash"
    creates: /etc/apt/sources.list.d/infisical-core.list

- name: Install Infisical CLI
  ansible.builtin.apt:
    name: infisical-core
    state: present
    update_cache: true
