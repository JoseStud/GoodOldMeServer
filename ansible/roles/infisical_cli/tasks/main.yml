---
- name: Download Infisical repository setup script
  ansible.builtin.get_url:
    url: "https://dl.cloudsmith.io/public/infisical/infisical-core/setup.deb.sh"
    dest: /tmp/infisical-setup.sh
    mode: "0755"

- name: Add Infisical apt repository via setup script
  ansible.builtin.command:
    cmd: bash /tmp/infisical-setup.sh
    creates: /etc/apt/sources.list.d/infisical-core.list

- name: Install Infisical CLI
  ansible.builtin.apt:
    name: infisical-core
    state: present
    update_cache: true
