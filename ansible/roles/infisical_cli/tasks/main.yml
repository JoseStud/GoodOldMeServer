---
# Install Infisical CLI via the official APT repository.
# Matches the method used in CI (artifacts-cli.infisical.com/setup.deb.sh).
# Avoids a GitHub API call to resolve the latest version, which fails on
# IPv6-only hosts (e.g. the GCP witness) that have no IPv4 internet gateway.
- name: Download Infisical CLI APT repository setup script
  ansible.builtin.get_url:
    url: https://artifacts-cli.infisical.com/setup.deb.sh
    dest: /tmp/infisical-setup.sh
    mode: '0755'

- name: Configure Infisical CLI APT repository
  ansible.builtin.command:
    cmd: bash /tmp/infisical-setup.sh
    creates: /etc/apt/sources.list.d/infisical-cli.list

- name: Install Infisical CLI
  ansible.builtin.apt:
    name: infisical
    state: present
    update_cache: true
