---
- name: Check if Infisical CLI is installed
  ansible.builtin.stat:
    path: /usr/local/bin/infisical
  register: infisical_binary

# Infisical is a monorepo; releases/latest may return a non-CLI release.
# List recent releases and pick the first infisical-cli tag.
- name: Get Infisical CLI releases
  ansible.builtin.uri:
    url: "https://api.github.com/repos/Infisical/infisical/releases?per_page=50"
    return_content: true
    body_format: json
  register: infisical_releases
  when: not infisical_binary.stat.exists

- name: Download and install Infisical CLI
  vars:
    infisical_version: "{{ (infisical_releases.json | selectattr('tag_name', 'match', '^infisical-cli/v') | first).tag_name | regex_replace('^infisical-cli/v', '') }}"
    infisical_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"
  when: not infisical_binary.stat.exists
  block:
    - name: Download Infisical CLI archive
      ansible.builtin.get_url:
        url: "https://github.com/Infisical/infisical/releases/download/infisical-cli%2Fv{{ infisical_version }}/infisical_{{ infisical_version }}_linux_{{ infisical_arch }}.tar.gz"
        dest: "/tmp/infisical_linux_{{ infisical_arch }}.tar.gz"
        mode: "0644"

    - name: Install Infisical CLI binary
      ansible.builtin.unarchive:
        src: "/tmp/infisical_linux_{{ infisical_arch }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        include:
          - infisical
