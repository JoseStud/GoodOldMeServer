---
- name: Provision Infrastructure
  hosts: all
  gather_facts: false # Disable until connection is verified
  
  tasks:
    - name: Wait for ssh connection to become available
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
    
    - name: Gather facts
      ansible.builtin.setup:

    - name: Verify connection
      ansible.builtin.ping:

    # Add further provisioning roles and tasks below
    - name: Run system_user role
      ansible.builtin.include_role:
        name: system_user

    - name: Run storage role
      ansible.builtin.include_role:
        name: storage

    - name: Install Tailscale
      ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Authenticate Tailscale (Requires TAILSCALE_AUTHKEY env)
      ansible.builtin.shell: tailscale up --authkey={{ lookup('env', 'TAILSCALE_AUTHKEY') }} --ssh
      ignore_errors: true

    - name: Create Global Swarm Mesh Network
      docker_network:
        name: traefik_proxy
        driver: overlay
        attachable: yes
        state: present
      run_once: true
