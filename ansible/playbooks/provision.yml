---
- name: Bootstrap OCI infrastructure
  hosts: oci_nodes
  become: true
  gather_facts: false

  tasks:
    - name: Wait for ssh connection to become available
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 600
      tags: [always]

    - name: Gather facts
      ansible.builtin.setup:
      tags: [always]

    - name: Verify connection
      ansible.builtin.ping:
      tags: [always]

    # === Phase 1: Base system setup ===
    - name: Run system_user role
      ansible.builtin.include_role:
        name: system_user
      tags: [phase1_base]

    - name: Run storage role (OCI block volumes)
      ansible.builtin.include_role:
        name: storage
      tags: [phase1_base]

    - name: Run infisical_cli role
      ansible.builtin.include_role:
        name: infisical_cli
      tags: [phase1_base]

    # === Phase 2: Docker Engine ===
    - name: Run docker role
      ansible.builtin.include_role:
        name: docker
      tags: [phase2_docker]

    # === Phase 3: Tailscale mesh networking ===
    - name: Run tailscale role
      ansible.builtin.include_role:
        name: tailscale
      tags: [phase3_tailscale]

- name: Bootstrap GCP witness over Tailscale
  hosts: gcp_witness
  become: true
  gather_facts: false

  tasks:
    - name: Wait for Tailscale SSH connection to become available
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 900
      tags: [always]

    - name: Gather facts
      ansible.builtin.setup:
      tags: [always]

    - name: Verify connection
      ansible.builtin.ping:
      tags: [always]

    # === Phase 1: Base system setup ===
    - name: Run system_user role
      ansible.builtin.include_role:
        name: system_user
      tags: [phase1_base]

    - name: Run infisical_cli role
      ansible.builtin.include_role:
        name: infisical_cli
      tags: [phase1_base]

    # === Phase 2: Docker Engine ===
    - name: Run docker role
      ansible.builtin.include_role:
        name: docker
      tags: [phase2_docker]

    # === Phase 3: Tailscale mesh networking ===
    - name: Run tailscale role
      ansible.builtin.include_role:
        name: tailscale
      tags: [phase3_tailscale]

- name: Provision clustered services
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Verify clustered nodes remain reachable
      ansible.builtin.ping:
      tags: [always]

    # === Phase 4: GlusterFS distributed storage (OCI nodes + GCP arbiter) ===
    - name: Run glusterfs role
      ansible.builtin.include_role:
        name: glusterfs
        public: true
      tags: [phase4_glusterfs]

    # === Phase 4b: Sync config files to GlusterFS ===
    - name: Sync stack configuration files to GlusterFS
      ansible.builtin.include_tasks:
        file: ../roles/glusterfs/tasks/sync-configs.yml
      tags: [phase4_glusterfs, sync-configs]

    # === Phase 5: Swarm bootstrap over Tailscale (includes overlay network) ===
    - name: Run swarm role
      ansible.builtin.include_role:
        name: swarm
      tags: [phase5_swarm]

    # === Phase 6: Portainer bootstrap (management stack + API key for Terraform) ===
    - name: Run portainer_bootstrap role
      ansible.builtin.include_role:
        name: portainer_bootstrap
      when: inventory_hostname == groups['oci_nodes'][0]
      tags: [phase6_portainer]

    # === Phase 7: Host runtime sync (/opt/stacks + Infisical agent) ===
    - name: Run runtime_sync role
      ansible.builtin.include_role:
        name: runtime_sync
      tags: [phase7_runtime_sync]
