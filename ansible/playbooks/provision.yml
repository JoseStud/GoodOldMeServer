---
- name: Provision Infrastructure
  hosts: all
  gather_facts: false # Disable until connection is verified
  
  tasks:
    - name: Wait for ssh connection to become available
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
    
    - name: Gather facts
      ansible.builtin.setup:

    - name: Verify connection
      ansible.builtin.ping:

    # === Phase 1: Base system setup ===
    - name: Run system_user role
      ansible.builtin.include_role:
        name: system_user

    - name: Run storage role (OCI block volumes)
      ansible.builtin.include_role:
        name: storage
      when: inventory_hostname in groups['oci_nodes']

    # === Phase 2: Docker Engine ===
    - name: Run docker role
      ansible.builtin.include_role:
        name: docker

    # === Phase 3: Tailscale mesh networking ===
    - name: Install Tailscale
      ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Authenticate Tailscale (Requires TAILSCALE_AUTHKEY env)
      ansible.builtin.shell: tailscale up --authkey={{ lookup('env', 'TAILSCALE_AUTHKEY') }} --ssh
      register: tailscale_result
      failed_when: tailscale_result.rc != 0

    - name: Verify Tailscale mesh connectivity
      ansible.builtin.assert:
        that:
          - tailscale_result.rc == 0
        fail_msg: "Tailscale authentication failed — check TAILSCALE_AUTHKEY validity. stderr: {{ tailscale_result.stderr }}"
        success_msg: "Node successfully joined Tailscale mesh"

    # === Phase 4: GlusterFS distributed storage (OCI nodes only) ===
    - name: Run glusterfs role
      ansible.builtin.include_role:
        name: glusterfs

    # === Phase 5: Swarm bootstrap over Tailscale (includes overlay network) ===
    - name: Run swarm role
      ansible.builtin.include_role:
        name: swarm
