---
- name: Provision Infrastructure
  hosts: all
  become: true
  gather_facts: false # Disable until connection is verified
  
  tasks:
    - name: Wait for ssh connection to become available
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 600
    
    - name: Gather facts
      ansible.builtin.setup:

    - name: Verify connection
      ansible.builtin.ping:

    # === Phase 1: Base system setup ===
    - name: Run system_user role
      ansible.builtin.include_role:
        name: system_user
      tags: [phase1_base]

    - name: Run storage role (OCI block volumes)
      ansible.builtin.include_role:
        name: storage
      when: inventory_hostname in groups['oci_nodes']
      tags: [phase1_base]

    - name: Run infisical_cli role
      ansible.builtin.include_role:
        name: infisical_cli
      tags: [phase1_base]

    # === Phase 2: Docker Engine ===
    - name: Run docker role
      ansible.builtin.include_role:
        name: docker
      tags: [phase2_docker]

    # === Phase 3: Tailscale mesh networking ===
    - name: Check if Tailscale is already authenticated
      ansible.builtin.command: tailscale status --json
      register: tailscale_status
      ignore_errors: true
      changed_when: false
      tags: [phase3_tailscale]

    - name: Install Tailscale via official APT repo
      when: tailscale_status.rc != 0 or 'BackendState' not in (tailscale_status.stdout | default(''))
      tags: [phase3_tailscale]
      block:
        - name: Add Tailscale signing key
          ansible.builtin.apt_key:
            url: https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.noarmor.gpg
            state: present

        - name: Add Tailscale APT repository
          ansible.builtin.apt_repository:
            repo: "deb https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} main"
            state: present
            filename: tailscale

        - name: Install Tailscale package
          ansible.builtin.apt:
            name: tailscale
            state: present
            update_cache: true

    - name: Authenticate Tailscale (Requires TAILSCALE_AUTH_KEY env)
      ansible.builtin.command: >
        tailscale up
        --authkey={{ lookup('env', 'TAILSCALE_AUTH_KEY') | mandatory('TAILSCALE_AUTH_KEY env var must not be empty') }}
        --ssh
      register: tailscale_result
      when: >
        tailscale_status.rc != 0 or
        (tailscale_status.stdout | from_json).BackendState | default('') != 'Running'
      changed_when: tailscale_result.rc == 0
      async: 90
      poll: 5
      tags: [phase3_tailscale]

    - name: Verify Tailscale mesh connectivity
      ansible.builtin.command: tailscale status
      register: tailscale_verify
      changed_when: false
      failed_when: tailscale_verify.rc != 0
      tags: [phase3_tailscale]

    # === Phase 4: GlusterFS distributed storage (OCI nodes + GCP arbiter) ===
    - name: Run glusterfs role
      ansible.builtin.include_role:
        name: glusterfs
      tags: [phase4_glusterfs]

    # === Phase 4b: Sync config files to GlusterFS ===
    - name: Sync stack configuration files to GlusterFS
      ansible.builtin.include_tasks:
        file: ../roles/glusterfs/tasks/sync-configs.yml
      tags: [phase4_glusterfs, sync-configs]

    # === Phase 5: Swarm bootstrap over Tailscale (includes overlay network) ===
    - name: Run swarm role
      ansible.builtin.include_role:
        name: swarm
      tags: [phase5_swarm]

    # === Phase 6: Portainer bootstrap (management stack + API key for Terraform) ===
    - name: Run portainer_bootstrap role
      ansible.builtin.include_role:
        name: portainer_bootstrap
      when: inventory_hostname == groups['oci_nodes'][0]
      tags: [phase6_portainer]

    # === Phase 7: Host runtime sync (/opt/stacks + Infisical agent) ===
    - name: Run runtime_sync role
      ansible.builtin.include_role:
        name: runtime_sync
      tags: [phase7_runtime_sync]
